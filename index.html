<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>재고관리 시스템</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ============================================================
     ① 사이트 전체 색상 / 기본값 모음
     여기 색상 코드(#로 시작하는 값)만 바꾸면 사이트 전체의
     해당 색이 한번에 바뀝니다. (예: --primary를 바꾸면 메인 파란색이
     쓰인 모든 버튼/글자색이 같이 바뀜)
     ============================================================ */
  :root {
    --primary: #4285F4;       /* 메인 색상(파랑) - 관리자 로그인 테두리, 품목추가 버튼, 탭 선택색 등에 쓰임 */
    --primary-light: #E8F0FE; /* 메인 색상의 연한 버전 - 버튼에 마우스 올렸을 때 배경 등 */
    --danger: #EA4335;        /* 위험/빼기 색상(빨강) - 마이너스 버튼, 로그아웃 버튼 글자색 */
    --danger-light: #FDE8E8;  /* 위험 색상의 연한 버전 - 마이너스 버튼 호버 배경 */
    --success: #34A853;       /* 성공/더하기 색상(초록) - 플러스 버튼, 확인 버튼 배경 */
    --success-light: #E6F4EA; /* 성공 색상의 연한 버전 - 플러스 버튼 호버 배경 */
    --warning: #FBBC04;       /* 경고 색상(노랑) - 재고부족 카드 테두리, 동기화중 표시 */
    --warning-light: #FEF7E0; /* 경고 색상의 연한 버전 - 재고부족 카드 배경 */
    --gray-50: #F8F9FA;       /* 아주 옅은 회색 - 페이지 배경 */
    --gray-100: #F1F3F4;      /* 옅은 회색 - 일반 배지 배경 */
    --gray-200: #E8EAED;      /* 연한 회색 - 테두리선 색 */
    --gray-400: #BDC1C6;      /* 중간 회색 (현재 미사용) */
    --gray-600: #80868B;      /* 진한 회색 - 보조 설명 글자색 */
    --gray-900: #202124;      /* 거의 검정 - 기본 글자색 */
    --radius: 8px;            /* 기본 모서리 둥글기(클수록 더 둥글어짐) */
    --shadow: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08); /* 카드/헤더 그림자 */
  }

  body { font-family: 'Google Sans', Roboto, Arial, sans-serif; background: var(--gray-50); color: var(--gray-900); min-height: 100vh; }

  /* ============================================================
     ② 상단 헤더 영역 (제목 + 동기화 상태 + 로그인/추가 버튼들)
     ============================================================ */
  .header { background: #fff; border-bottom: 1px solid var(--gray-200); padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 60px; /* 헤더 전체 높이 */ position: sticky; top: 0; z-index: 10; box-shadow: var(--shadow); }
  .header h1 { font-size: 18px; /* "재고관리" 제목 글자 크기 */ font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .header h1 span { color: var(--primary); } /* "재고" 글자만 파란색 */
  .header-right { display: flex; align-items: center; gap: 10px; /* 헤더 우측 버튼들 사이 간격 */ }
  .sync-status { font-size: 12px; color: var(--gray-600); display: flex; align-items: center; gap: 5px; } /* "연결됨" 글자 */
  .sync-dot { width: 8px; height: 8px; /* 동기화 점 크기 */ border-radius: 50%; background: var(--success); }
  .sync-dot.loading { background: var(--warning); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* 탭 버튼 ("재고 현황" / "입출고 이력" 전환 버튼) */
  .tab-bar { background: #fff; border-bottom: 1px solid var(--gray-200); padding: 0 1.5rem; display: flex; }
  .tab { padding: 14px 20px; /* 탭 버튼 위아래/좌우 여백 = 클릭 영역 크기 */ font-size: 14px; /* 탭 글자 크기 */ font-weight: 500; color: var(--gray-600); border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.15s; }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); } /* 선택된 탭은 파란 글자 + 파란 밑줄 */

  .main { max-width: 960px; margin: 0 auto; padding: 1.5rem; /* 본문 영역 좌우 여백 */ }

  /* 검색창 + 정렬 드롭다운 + 새로고침 버튼이 있는 줄 */
  .toolbar { display: flex; gap: 8px; /* 검색창/버튼 사이 간격 */ margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  .search-input { flex: 1; min-width: 180px; padding: 9px 14px; /* 검색창 안쪽 여백(클수록 통통해짐) */ border: 1px solid var(--gray-200); border-radius: var(--radius); font-size: 14px; /* 검색창 글자 크기 */ background: #fff; color: var(--gray-900); outline: none; }
  .search-input:focus { border-color: var(--primary); }
  .filter-select { padding: 9px 12px; border: 1px solid var(--gray-200); border-radius: var(--radius); font-size: 14px; background: #fff; color: var(--gray-900); outline: none; cursor: pointer; } /* 정렬 드롭다운 */

  /* "🔒 관리자 로그인" / "+ 품목 추가" / "↻ 새로고침" 등 공통 버튼 모양 */
  .btn { padding: 9px 18px; /* 버튼 크기(여백) */ border-radius: var(--radius); /* 버튼 모서리 둥글기 */ font-size: 14px; /* 버튼 글자 크기 */ font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: var(--primary); color: #fff; } /* 꽉찬 파란 버튼: "+ 품목 추가" */
  .btn-primary:hover { background: #3367D6; } /* 위 버튼 마우스 올렸을 때 색 */
  .btn-outline { background: #fff; color: var(--primary); border: 1px solid var(--primary); } /* 테두리만 있는 버튼: "관리자 로그인", "새로고침" */
  .btn-outline:hover { background: var(--primary-light); }

  /* 카테고리 칩 버튼 (전체 / ⚠악성 / 강관 / 각관 ... 둥근 알약 모양 필터) */
  .cat-filter-row { display: flex; gap: 6px; /* 칩들 사이 간격 */ flex-wrap: wrap; margin-bottom: 1rem; }
  .cat-chip { padding: 5px 14px; /* 칩 크기 */ border-radius: 20px; /* 둥근 알약 모양 정도 */ font-size: 13px; /* 칩 글자 크기 */ font-weight: 500; border: 1px solid var(--gray-200); background: #fff; color: var(--gray-600); cursor: pointer; transition: all 0.15s; }
  .cat-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); } /* 선택된 칩은 파란 배경 */

  /* 정렬을 "카테고리순"으로 했을 때 보이는 그룹 제목 */
  .cat-group { margin-bottom: 1.5rem; }
  .cat-group-title { font-size: 13px; font-weight: 600; color: var(--gray-600); padding: 6px 12px; background: var(--gray-100); border-radius: var(--radius); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .cat-count { font-size: 11px; background: var(--gray-200); color: var(--gray-600); padding: 1px 7px; border-radius: 10px; } /* "n개 품목" 작은 숫자 배지 */

  /* ============================================================
     ③ 품목 카드 (재고 목록에서 품목 한 줄 한 줄)
     ============================================================ */
  .item-card { background: #fff; border: 1px solid var(--gray-200); border-radius: 14px; /* 카드 모서리 둥글기 */ padding: 10px 12px; /* 카드 안쪽 여백 */ margin-bottom: 6px; /* 카드와 카드 사이 간격 */ box-shadow: var(--shadow); }
  .item-card.low { border-color: var(--warning); background: var(--warning-light); } /* 재고부족 카드는 노란 테두리+배경 */
  .item-body { display: flex; align-items: center; gap: 8px; min-height: 44px; flex-wrap: wrap; }

  .item-left { flex: 1; min-width: 0; display: flex; align-items: center; gap: 6px; /* 좌측 배지들 사이 간격 */ flex-wrap: wrap; }
  .item-field { white-space: nowrap; }

  /* "악성" 빨간 배지 */
  .item-field.f-bad { display: inline-flex; align-items: center; justify-content: center; color: #e03131; /* 악성 글자색(빨강) */ font-weight: 700; border: 1.5px solid #e03131; /* 악성 테두리 두께/색 */ border-radius: 50px; padding: 3px 10px; /* 악성 배지 크기 */ font-size: 13px; background: #fff; white-space: nowrap; }

  /* 일반 배지 (규격/품목명/사이즈/재질/두께를 보여주는 회색 알약) */
  .item-field.f-badge { display: inline-flex; align-items: center; justify-content: center; background: var(--gray-100); /* 일반 배지 배경색(회색) */ color: var(--gray-900); border-radius: 50px; padding: 3px 8px; /* 일반 배지 크기 */ font-size: 13px; /* 일반 배지 글자 크기 */ font-weight: 500; white-space: nowrap; }

  /* 카테고리 파란 배지(강관/각관 등) */
  .item-field.f-cat { background: #E8F0FE; color: #1a56c4; border-radius: 50px; padding: 3px 8px; font-size: 13px; font-weight: 500; white-space: nowrap; display: inline-flex; align-items: center; justify-content: center; }

  .item-warn { font-size: 12px; color: #B06000; background: var(--warning-light); border-radius: 50px; padding: 2px 8px; white-space: nowrap; } /* "⚠ 부족" 작은 글자 */

  /* 카드 우측: 현재수량 배지 + 수량 조절 버튼들이 있는 영역 */
  .item-right { display: flex; align-items: center; gap: 6px; /* 우측 버튼들 사이 간격 */ flex-shrink: 0; justify-content: flex-end; width: 100%; }

  /* "현재수량 : n" 빨간 테두리 배지 */
  .badge-qty { color: #e03131; font-weight: 700; font-size: 14px; /* 수량 배지 글자 크기 */ padding: 6px 14px; /* 수량 배지 크기 */ border-radius: 50px; white-space: nowrap; border: 1.5px solid #e03131; background: #fff; }
  .badge-qty.pending { border-color: var(--warning); color: #7a5c00; } /* 수량 변경 중(아직 저장 전)일 때 노란색으로 바뀜 */

  /* −(빼기) / +(더하기) 방향 선택 버튼 — 세로로 두 개 쌓여있는 작은 동그라미 버튼 */
  .qty-pm-wrap { display: flex; flex-direction: column; gap: 3px; /* −버튼과 +버튼 사이 간격 */ }
  .qty-btn { width: 28px; height: 28px; /* −/+ 버튼 크기(동그라미 지름) */ border-radius: 50%; background: #fff; font-size: 17px; /* −/+ 기호 글자 크기 */ cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; flex-shrink: 0; border: 1.5px solid; line-height: 1; padding: 0; }
  .qty-btn-minus { color: var(--danger); border-color: var(--danger); } /* − 버튼: 빨간 글자/테두리 */
  .qty-btn-minus:hover { background: var(--danger-light); }
  .qty-btn-plus { color: var(--success); border-color: var(--success); } /* + 버튼: 초록 글자/테두리 */
  .qty-btn-plus:hover { background: var(--success-light); }
  .qty-btn-minus.active-minus { background: var(--danger); color: #fff; } /* − 버튼이 선택(활성)되면 꽉 찬 빨강 */
  .qty-btn-plus.active-plus   { background: var(--success); color: #fff; } /* + 버튼이 선택(활성)되면 꽉 찬 초록 */

  /* 수량 직접 입력하는 칸 (숫자 타이핑하는 작은 네모) */
  .qty-direct-input { width: 80px; /* 입력칸 가로 폭 */ padding: 4px 6px; border: 1.5px solid var(--gray-200); border-radius: 8px; font-size: 14px; font-weight: 700; text-align: right; outline: none; color: var(--gray-900); }
  .qty-direct-input:focus { border-color: var(--primary); }
  /* 수량 입력칸 오른쪽 화살표(스피너) 없애기 — 크롬/엣지/사파리용 */
  .qty-direct-input::-webkit-inner-spin-button,
  .qty-direct-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  /* 수량 입력칸 오른쪽 화살표(스피너) 없애기 — 파이어폭스용 */
  .qty-direct-input { -moz-appearance: textfield; }

  /* 입출고 사유 입력칸 (출고일 땐 필수, 입고일 땐 선택) */
  .qty-reason-input { width: 140px; /* 사유 입력칸 가로 폭 */ padding: 4px 10px; border: 1.5px solid var(--gray-200); border-radius: 8px; font-size: 13px; /* 사유 입력칸 글자 크기 */ outline: none; color: var(--gray-900); }
  .qty-reason-input:focus { border-color: var(--primary); }
  .qty-reason-input.required-empty { border-color: var(--danger); } /* 출고인데 사유를 안 적었을 때 빨간 테두리로 표시 */

  /* "✔ 확인" 초록 알약 버튼 — 수량 변경을 실제로 서버에 저장할 때 누르는 버튼 */
  .qty-confirm-btn { height: 36px; /* 확인 버튼 높이 */ padding: 0 16px; /* 확인 버튼 좌우 여백(폭) */ background: var(--success); color: #fff; border: none; border-radius: 50px; font-size: 13px; /* 확인 버튼 글자 크기 */ font-weight: 700; cursor: pointer; white-space: nowrap; }
  .qty-confirm-btn:hover { background: #2d9246; }

  /* "✕" 취소 버튼 — 수량 변경 중인 것을 취소하는 작은 동그라미 버튼 (현재 화면에는 표시되지 않음) */
  .qty-cancel-btn { width: 32px; height: 32px; /* 취소 버튼 크기 */ border-radius: 50%; background: #fff; color: var(--gray-600); border: 1.5px solid var(--gray-200); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .qty-cancel-btn:hover { background: var(--gray-100); }

  /* ============================================================
     ④ 입출고 이력 표
     ============================================================ */
  .log-table-wrap { background: #fff; border: 1px solid var(--gray-200); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); }
  .log-table { width: 100%; border-collapse: collapse; font-size: 13px; /* 표 전체 글자 크기 */ }
  .log-table th { background: var(--gray-50); color: var(--gray-600); font-weight: 600; font-size: 12px; padding: 10px 16px; /* 표 머리글 칸 여백 */ text-align: left; border-bottom: 1px solid var(--gray-200); }
  .log-table td { padding: 10px 16px; /* 표 내용 칸 여백 */ border-bottom: 1px solid var(--gray-100); }
  .log-table tr:last-child td { border-bottom: none; }
  .log-table tr:hover td { background: var(--gray-50); }
  .chg-in { color: var(--success); font-weight: 600; } /* 입고(+) 글자는 초록 */
  .chg-out { color: var(--danger); font-weight: 600; } /* 출고(-) 글자는 빨강 */

  /* ============================================================
     ⑤ 팝업창(모달) 공통 — 관리자 로그인 창 / 품목 추가·수정 창
     ============================================================ */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); /* 팝업 뒤 어둡게 깔리는 배경(숫자 0.4=투명도) */ display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
  .modal { background: #fff; border-radius: 16px; /* 팝업창 모서리 둥글기 */ padding: 1.75rem; /* 팝업창 안쪽 여백 */ width: 420px; /* 팝업창 가로 폭 */ max-width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.18); max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 18px; /* 팝업창 제목 글자 크기 */ font-weight: 600; margin-bottom: 1.25rem; }
  .form-group { margin-bottom: 14px; /* 입력칸과 입력칸 사이 위아래 간격 */ }
  .form-group input, .form-group select { width: 100%; padding: 9px 12px; /* 입력칸 안쪽 여백 */ border: 1px solid var(--gray-200); border-radius: var(--radius); font-size: 14px; /* 입력칸 글자 크기 */ color: var(--gray-900); outline: none; background: #fff; }
  .form-group input:focus, .form-group select:focus { border-color: var(--primary); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; /* 두 칸씩 나란히 배치할 때 사이 간격 */ }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.25rem; } /* "취소"/"저장" 버튼 줄 */
  .field-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
  .field-label { font-size: 13px; color: var(--gray-600); font-weight: 500; } /* "카테고리 *", "재질" 같은 항목 이름 글자 */

  /* "+ 관리" 텍스트 버튼 — 카테고리/재질/규격/두께 목록을 추가·삭제하는 패널을 여는 버튼 */
  .manage-btn { background: none; border: none; color: var(--primary); font-size: 12px; /* + 관리 버튼 글자 크기 */ font-weight: 600; cursor: pointer; padding: 0; }
  .manage-btn:hover { text-decoration: underline; }

  /* "+ 관리" 버튼을 누르면 펼쳐지는 회색 박스 영역 */
  .inline-panel { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 10px; /* 패널 안쪽 여백 */ margin-top: 6px; margin-bottom: 6px; }
  .tag-wrap { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; min-height: 26px; }

  /* 관리 패널 안의 파란 알약 태그 (예: "강관 ×") */
  .itag { font-size: 12px; /* 태그 글자 크기 */ padding: 3px 10px; /* 태그 크기 */ border-radius: 20px; background: #E8F0FE; color: #1a56c4; display: inline-flex; align-items: center; gap: 3px; }
  .itag-del { background: none; border: none; color: #1a56c4; cursor: pointer; font-size: 14px; line-height: 1; padding: 0; } /* 태그 옆 "×" 삭제 버튼 */

  /* 관리 패널 안의 "새 항목 입력 + 추가" 줄 */
  .add-row { display: flex; gap: 6px; }
  .add-row input { flex: 1; padding: 6px 10px; border: 1px solid var(--gray-200); border-radius: var(--radius); font-size: 13px; outline: none; background: #fff; }
  .add-row input:focus { border-color: var(--primary); }
  .add-row button { padding: 6px 14px; /* "추가" 버튼 크기 */ background: var(--primary); color: #fff; border: none; border-radius: 20px; font-size: 13px; /* "추가" 버튼 글자 크기 */ cursor: pointer; white-space: nowrap; } /* "추가" 버튼 */

<script>
const SUPABASE_URL  = 'https://lhixtdtgbjylkgrndhfy.supabase.co';   // ← 여기에 Project URL 입력
const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxoaXh0ZHRnYmp5bGtncm5kaGZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MjM0NDgsImV4cCI6MjA5ODM5OTQ0OH0.3jIRWf8hVuPLjYuaez_WIRw0H4GiyHhltk2yhyTuAYs';   // ← 여기에 anon public key 입력
const ADMIN_PASSWORD = '9096';                // ← 비밀번호

const CACHE_KEY = 'inv_cache';
const OPT_KEY   = 'inv_opt';

let items = [], logs = [], editId = null, isAdmin = false, activeCat = '전체', logPeriod = '3m';

const DEFAULT_OPT = {
  cat:       ['강관','각관','앵글','플레이트','플랜지','밸브','볼트/너트'],
  material:  ['SS400','STS304','AL','PP','PE'],
  thickness: ['1.0t','1.2t','1.5t','2.0t','2.3t','2.5t','3.0t','3.2t','4.0t','4.5t','5.0t','6.0t'],
  spec: {
    '강관':     ['15A(Ø21.7)','20A(Ø27.2)','25A(Ø34.0)','32A(Ø42.7)','40A(Ø48.6)','50A(Ø60.5)','65A(Ø76.3)','80A(Ø89.1)','100A(Ø114.3)','125A(Ø139.8)','150A(Ø165.2)','200A(Ø216.3)'],
    '각관':     ['20x20','25x25','30x30','40x40','50x50','60x60','75x75','100x100','20x40','25x50','30x60','40x80','50x100'],
    '앵글':     ['25x25','30x30','40x40','50x50','60x60','75x75','100x100'],
    '플레이트':  ['100x100','150x150','200x200','250x250','300x300'],
    '플랜지':   ['15A','20A','25A','32A','40A','50A','65A','80A','100A','125A','150A','200A'],
    '밸브':     ['15A','20A','25A','32A','40A','50A','65A','80A','100A'],
    '볼트/너트': ['M6','M8','M10','M12','M16','M20','M24'],
  }
};

let optData = JSON.parse(JSON.stringify(DEFAULT_OPT));

// ============================================================
// Supabase API
// ============================================================
async function sb(path, method='GET', body=null) {
  setSyncing(true);
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
      method,
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': method==='POST' ? 'return=representation' : 'return=representation',
      },
      body: body ? JSON.stringify(body) : null,
    });
    if (!res.ok) throw new Error(await res.text());
    const text = await res.text();
    return text ? JSON.parse(text) : [];
  } finally {
    setSyncing(false);
  }
}

function setSyncing(v) {
  document.getElementById('sync-dot').className = 'sync-dot'+(v?' loading':'');
  document.getElementById('sync-text').textContent = v ? '동기화 중...' : '연결됨';
}

// ============================================================
// 캐시
// ============================================================
function saveCache(data) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ts: Date.now(), ...data})); } catch(e) {}
}
function loadCache() {
  try { return JSON.parse(localStorage.getItem(CACHE_KEY)); } catch(e) { return null; }
}
function saveOptCache(opt) {
  try { localStorage.setItem(OPT_KEY, JSON.stringify(opt)); } catch(e) {}
}
function loadOptCache() {
  try { return JSON.parse(localStorage.getItem(OPT_KEY)); } catch(e) { return null; }
}

// ============================================================
// 초기 로드
// ============================================================
async function loadAll(forceRefresh=false) {
  const cache    = loadCache();
  const optCache = loadOptCache();

  if (!forceRefresh && cache && cache.items) {
    items = cache.items;
    logs  = cache.logs || [];
    if (optCache) optData = optCache;
    renderCatChips(); renderItems(); renderLog(); applyAdminUI();
    document.getElementById('cache-banner').classList.remove('hidden');
    fetchFresh().then(() => document.getElementById('cache-banner').classList.add('hidden'));
    return;
  }

  document.getElementById('item-list').innerHTML = '<div class="loading">⚡ 불러오는 중...</div>';
  await fetchFresh();
  document.getElementById('cache-banner').classList.add('hidden');
}

// ============================================================
// 입출고 이력 기간 필터
// ============================================================
// 기간 코드('1m','3m','6m','1y','3y')를 실제 날짜(그만큼 이전 날짜)로 변환
function periodToDate(period) {
  const months = { '1m':1, '3m':3, '6m':6, '1y':12, '3y':36 }[period] || 3;
  const d = new Date();
  d.setMonth(d.getMonth() - months);
  return d.toISOString();
}

// Supabase에서 받아온 입출고이력 원본 행 → 화면에서 쓰는 형태로 변환
function mapLogRows(rows) {
  return rows.map(r => ({
    id:        r.item_id,
    category:  r.category || '',
    name:      r.name || '',
    spec:      r.spec || '',
    size:      r.size || '',
    material:  r.material || '',
    thickness: r.thickness || '',
    delta:     r.delta,
    qty:       r.qty,
    reason:    r.reason || '',
    time:      new Date(r.created_at).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}),
  }));
}

// 기간 드롭다운을 바꿨을 때 → 해당 기간만큼만 서버에서 다시 불러옴
async function changeLogPeriod(period) {
  logPeriod = period;
  document.getElementById('log-body').innerHTML = '<tr><td colspan="10" class="loading">⚡ 불러오는 중...</td></tr>';
  try {
    const logRows = await sb(`입출고이력?created_at=gte.${encodeURIComponent(periodToDate(period))}&order=created_at.desc`);
    logs = mapLogRows(logRows);
    saveCache({items, logs});
    renderLog();
  } catch(e) {
    console.error(e);
    toast('⚠ 이력을 불러오지 못했습니다.');
  }
}

async function fetchFresh() {
  try {
    const [itemRows, logRows, optRows] = await Promise.all([
      sb('품목?order=created_at.asc'),
      sb(`입출고이력?created_at=gte.${encodeURIComponent(periodToDate(logPeriod))}&order=created_at.desc`),
      sb('옵션설정?id=eq.1'),
    ]);

    items = itemRows.map(r => ({
      id:        r.id,
      isBad:     r.is_bad,
      category:  r.category || '',
      name:      r.name || '',
      material:  r.material || '',
      size:      r.size || '',
      spec:      r.spec || '',
      thickness: r.thickness || '',
      qty:       r.qty || 0,
      min:       r.min_qty || 5,
    }));

    logs = mapLogRows(logRows);

    if (optRows.length && optRows[0].data) {
      optData = optRows[0].data;
      saveOptCache(optData);
    } else {
      const oc = loadOptCache();
      if (oc) optData = oc;
    }

    // 기존에 저장된 카테고리/재질/규격/두께 순서가 규칙과 다르면 한 번 재정렬해서 다시 저장
    // (순서가 이미 맞으면 그냥 넘어가고, 서버에 불필요한 저장은 하지 않음)
    const beforeSort = JSON.stringify(optData);
    sortAllOptions();
    if (JSON.stringify(optData) !== beforeSort) {
      persistOptions();
    }

    saveCache({items, logs});
    renderCatChips(); renderItems(); renderLog(); applyAdminUI();
  } catch(e) {
    console.error(e);
    const cache = loadCache();
    if (cache && cache.items) {
      items = cache.items;
      logs  = cache.logs || [];
      renderCatChips(); renderItems(); renderLog();
      toast('⚠ 서버 연결 실패. 캐시 데이터를 표시합니다.');
    }
  }
}

// ============================================================
// 관리자 (서버 없이 클라이언트 검증)
// ============================================================
function openAdminModal() {
  document.getElementById('admin-pw').value = '';
  document.getElementById('admin-error').style.display = 'none';
  document.getElementById('admin-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('admin-pw').focus(), 100);
}
function closeAdminModal() { document.getElementById('admin-modal').style.display = 'none'; }
async function submitAdminLogin() {
  const pw = document.getElementById('admin-pw').value;
  if (pw === ADMIN_PASSWORD) {
    isAdmin = true; closeAdminModal(); applyAdminUI(); toast('관리자 모드로 전환됐어요.');
  } else {
    document.getElementById('admin-error').style.display = 'block';
  }
}

// ============================================================
// 정렬 도우미
// - 카테고리/재질: 가나다순
// - 규격/두께: 숫자 크기순 (예: 50x50 < 50x75 < 50x100, 100A < 125A < 150A)
// ============================================================
function naturalCompare(a, b) {
  // 문자열을 "숫자 덩어리"와 "문자 덩어리"로 쪼개서, 숫자는 크기로, 문자는 가나다순으로 비교
  const tokenize = s => s.match(/(\d+(\.\d+)?)|(\D+)/g) || [];
  const ta = tokenize(a), tb = tokenize(b);
  const len = Math.max(ta.length, tb.length);
  for (let i = 0; i < len; i++) {
    const pa = ta[i] || '', pb = tb[i] || '';
    const na = parseFloat(pa), nb = parseFloat(pb);
    const isNumA = /^\d/.test(pa), isNumB = /^\d/.test(pb);
    if (isNumA && isNumB) {
      if (na !== nb) return na - nb;
    } else {
      const c = pa.localeCompare(pb, 'ko');
      if (c !== 0) return c;
    }
  }
  return 0;
}

// 카테고리/재질/규격/두께 전체 목록을 한 번에 재정렬
// (기존에 뒤죽박죽 저장된 목록도 규칙에 맞게 다시 정렬해줌)
function sortAllOptions() {
  optData.cat       = [...optData.cat].sort((a,b) => a.localeCompare(b, 'ko'));       // 카테고리: 가나다순
  optData.material  = [...optData.material].sort((a,b) => a.localeCompare(b, 'ko'));  // 재질: 가나다순
  optData.thickness = [...optData.thickness].sort(naturalCompare);                     // 두께: 숫자순
  Object.keys(optData.spec || {}).forEach(cat => {
    optData.spec[cat] = [...optData.spec[cat]].sort(naturalCompare);                  // 규격: 숫자순 (카테고리별)
  });
}

// 항목(field)에 맞는 정렬 기준으로 배열의 알맞은 위치에 새 값을 끼워 넣음
function insertSorted(arr, val, field) {
  const useKorean = (field === 'cat' || field === 'material'); // 카테고리/재질 = 가나다순, 나머지(규격/두께) = 숫자순
  const idx = arr.findIndex(item => useKorean ? item.localeCompare(val, 'ko') > 0 : naturalCompare(item, val) > 0);
  if (idx === -1) arr.push(val);
  else arr.splice(idx, 0, val);
}

// ============================================================
// 태그 추가/삭제 → 자동으로 Sheets에 저장
// ============================================================
function addTag(field) {
  const inp = document.getElementById('new-'+field);
  const val = inp.value.trim();
  if (!val) return;
  if (field === 'spec') {
    const cat = document.getElementById('f-cat').value;
    if (!cat) { toast('카테고리를 먼저 선택해주세요.'); return; }
    if (!optData.spec[cat]) optData.spec[cat] = [];
    if (optData.spec[cat].includes(val)) { toast('이미 있어요.'); return; }
    insertSorted(optData.spec[cat], val, 'spec');
    refreshSelect('spec');
  } else if (field === 'cat') {
    if (optData.cat.includes(val)) { toast('이미 있어요.'); return; }
    insertSorted(optData.cat, val, 'cat');
    refreshSelect('cat');
  } else if (field === 'material') {
    if (optData.material.includes(val)) { toast('이미 있어요.'); return; }
    insertSorted(optData.material, val, 'material');
    refreshSelect('material');
  } else {
    if (optData.thickness.includes(val)) { toast('이미 있어요.'); return; }
    insertSorted(optData.thickness, val, 'thickness');
    refreshSelect('thickness');
  }
  inp.value = '';
  renderTags(field);
  toast(`"${val}" 추가됐어요!`);
  persistOptions();
}


function delTag(field, idx) {
  if (field === 'spec') {
    const cat = document.getElementById('f-cat').value;
    if (cat && optData.spec[cat]) { optData.spec[cat].splice(idx,1); refreshSelect('spec'); }
  } else if (field === 'cat') {
    const name = optData.cat[idx];
    if (items.some(i => i.category === name)) { toast(`"${name}"을 사용 중인 품목이 있어요.`); return; }
    optData.cat.splice(idx,1); refreshSelect('cat');
  } else if (field === 'material') {
    optData.material.splice(idx,1); refreshSelect('material');
  } else {
    optData.thickness.splice(idx,1); refreshSelect('thickness');
  }
  renderTags(field);
  persistOptions();
}

  saveOptCache(optData);

}

    sel.innerHTML = '<option value="">선택</option>' +
      optData.thickness.map(t => `<option${t===cur?' selected':''}>${t}</option>`).join('');

function renderCatChips() {
  const allCats = ['전체','⚠ 악성','⚠ 부족',...optData.cat];
  document.getElementById('cat-filter-row').innerHTML = allCats.map(c =>
    `<button class="cat-chip${activeCat===c?' active':''}" ${(c==='⚠ 악성'||c==='⚠ 부족')?'style="border-color:#e03131;color:#e03131;"':''} onclick="setCat('${c}')">${c}</button>`
  ).join('');
}
function setCat(cat) { activeCat=cat; renderCatChips(); renderItems(); }

function renderItems() {
  const q    = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort-select').value;
  let filtered = items.filter(i =>
    i.qty > 0 &&
    (activeCat==='전체' || (activeCat==='⚠ 악성' && i.isBad) || (activeCat==='⚠ 부족' && i.qty < i.min) || i.category===activeCat) &&
    (i.name.toLowerCase().includes(q) || (i.material||'').toLowerCase().includes(q) ||
     (i.spec||'').toLowerCase().includes(q) || (i.category||'').toLowerCase().includes(q))
  );
  filtered.sort((a,b) => {
    if (sort==='cat')      return (a.category||'').localeCompare(b.category||'');
    if (sort==='spec')     return (a.spec||'').localeCompare(b.spec||'');
    if (sort==='qty-asc')  return a.qty - b.qty;
    if (sort==='qty-desc') return b.qty - a.qty;
    return a.name.localeCompare(b.name);
  });
  const el = document.getElementById('item-list');
  if (!filtered.length) {
    el.innerHTML='<div class="empty"><div class="empty-icon">📭</div>품목이 없습니다.</div>';
    return;
  }
  if (sort === 'cat') {
    const groups = {};
    filtered.forEach(i => { const k=i.category||'미분류'; if(!groups[k])groups[k]=[]; groups[k].push(i); });
    el.innerHTML = Object.entries(groups).map(([cat,list]) => `
      <div class="cat-group">
        <div class="cat-group-title">${cat}<span class="cat-count">${list.length}개 품목</span></div>
        ${list.map(cardHTML).join('')}
      </div>`).join('');
  } else {
    el.innerHTML = filtered.map(cardHTML).join('');
  }
  applyAdminUI();
}

function cardHTML(item) {
  const isLow = item.qty < item.min;
  const id    = item.id;
  // 좌측 그리드: 특징 | 카테고리 | 규격 | 품목명 | 사이즈 | 재질 | 두께
  const leftHTML = `
    <span class="item-field">${item.isBad ? `<span class="item-field f-bad">악성</span>` : ''}</span>
    <span class="item-field f-cat">${item.category || ''}</span>
    <span class="item-field f-badge">${item.spec || ''}</span>
    <span class="item-field f-badge">${item.name || ''}</span>
    <span class="item-field f-badge">${item.size || ''}</span>
    <span class="item-field f-badge">${item.material || ''}</span>
    <span class="item-field f-badge">${item.thickness || ''}</span>
  `;

  return `
  <div class="item-card${isLow?' low':''}" id="card-${id}">
    <div class="item-body">
      <div class="item-left">${leftHTML}</div>
      <div class="item-right">
        <span class="badge-qty" id="qty-badge-${id}">현재수량 : ${item.qty.toLocaleString()}</span>
        ${isLow ? '<span class="item-warn">⚠ 부족</span>' : ''}
        <div class="qty-pm-wrap admin-only" style="display:none">
          <button class="qty-btn qty-btn-plus" id="sign-plus-${id}" onclick="toggleSign('${id}','plus')">+</button>
          <button class="qty-btn qty-btn-minus active-minus" id="sign-minus-${id}" onclick="toggleSign('${id}','minus')">−</button>
        </div>
        <input class="qty-direct-input admin-only" id="qty-input-${id}" style="display:none" type="number" min="0" placeholder="수량" oninput="onDirectInput('${id}',${item.qty})">
        <input class="qty-reason-input admin-only" id="qty-reason-${id}" style="display:none" type="text" placeholder="사유 (출고 시 필수)" oninput="onReasonInput('${id}')">
        <button class="qty-confirm-btn admin-only" id="qty-confirm-${id}" style="display:none" onclick="confirmQty('${id}')">✔ 확인</button>
      </div>
    </div>
  </div>`;
}

// 임시 수량 저장소
const pendingQty = {};

// −/+ 버튼: 방향(빼기/더하기) 토글
function toggleSign(id, sign) {
  const minusBtn = document.getElementById('sign-minus-'+id);
  const plusBtn  = document.getElementById('sign-plus-'+id);
  const card     = document.getElementById('card-'+id);
  card.dataset.sign = sign;
  if (sign === 'minus') {
    minusBtn.classList.add('active-minus');
    plusBtn.classList.remove('active-plus');
  } else {
    plusBtn.classList.add('active-plus');
    minusBtn.classList.remove('active-minus');
  }
  // 입력값 있으면 즉시 미리보기 갱신
  const item = items.find(i => i.id===id); if (!item) return;
  onDirectInput(id, item.qty);
}

// 입력창 직접 타이핑
function onDirectInput(id, baseQty) {
  const item  = items.find(i => i.id===id); if (!item) return;
  const card  = document.getElementById('card-'+id);
  const sign  = card.dataset.sign || 'minus';
  const val   = parseInt(document.getElementById('qty-input-'+id).value);
  if (isNaN(val) || val < 0) return;
  const delta = sign === 'minus' ? -val : val;
  const next  = item.qty + delta;
  if (next < 0) {
    document.getElementById('qty-badge-'+id).textContent = `⚠ 수량 부족!`;
    document.getElementById('qty-badge-'+id).className = 'badge-qty pending';
    pendingQty[id] = null;
    document.getElementById('qty-confirm-'+id).style.display = 'none';
    document.getElementById('qty-cancel-'+id).style.display  = val > 0 ? '' : 'none';
    document.getElementById('qty-reason-'+id).style.display  = 'none';
    return;
  }
  pendingQty[id] = { delta, localQty: next };
  const badge = document.getElementById('qty-badge-'+id);
  if (val === 0) {
    badge.textContent = `현재수량 : ${item.qty.toLocaleString()}`;
    badge.className   = 'badge-qty';
    document.getElementById('qty-confirm-'+id).style.display = 'none';
    document.getElementById('qty-cancel-'+id).style.display  = 'none';
    document.getElementById('qty-reason-'+id).style.display  = 'none';
  } else {
    badge.textContent = `${item.qty.toLocaleString()} → ${next.toLocaleString()}`;
    badge.className   = 'badge-qty pending';
    document.getElementById('qty-confirm-'+id).style.display = '';
    document.getElementById('qty-cancel-'+id).style.display  = '';
    document.getElementById('qty-reason-'+id).style.display  = '';
  }
}

// 사유 입력칸에 타이핑하면, 비어있다고 빨간 테두리로 표시했던 걸 원래대로 되돌림
function onReasonInput(id) {
  document.getElementById('qty-reason-'+id).classList.remove('required-empty');
}

// 확인 → 서버 저장
async function confirmQty(id) {
  const item = items.find(i => i.id===id); if (!item) return;
  const p    = pendingQty[id];
  if (!p || p.delta === 0) return;
  const reasonInput = document.getElementById('qty-reason-'+id);
  const reason = reasonInput.value.trim();
  if (p.delta < 0 && !reason) {
    // 출고인데 사유가 비어있으면 저장하지 않고 빨간 테두리로 알려줌
    reasonInput.classList.add('required-empty');
    reasonInput.focus();
    toast('⚠ 출고 사유를 입력해 주세요.');
    return;
  }
  const newQty = Math.max(0, item.qty + p.delta);
  await sb(`품목?id=eq.${id}`, 'PATCH', {qty: newQty});
  await sb('입출고이력', 'POST', {
    item_id: id, category: item.category, name: item.name,
    spec: item.spec, size: item.size, material: item.material, thickness: item.thickness,
    delta: p.delta, qty: newQty, reason: reason || null
  });
  item.qty = newQty;
  const time = new Date().toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  logs.unshift({
    id, name:item.name, category:item.category,
    spec:item.spec, size:item.size, material:item.material, thickness:item.thickness,
    delta:p.delta, qty:newQty, reason, time
  });
  delete pendingQty[id];
  reasonInput.value = '';
  saveCache({items, logs});
  renderItems(); applyAdminUI(); renderLog();
  toast(`${item.name} ${p.delta>0?'+'+p.delta:p.delta}개 저장 완료`);
}

// 취소 → 원복
function cancelQty(id) {
  const item = items.find(i => i.id===id); if (!item) return;
  delete pendingQty[id];
  const badge  = document.getElementById('qty-badge-'+id);
  const input  = document.getElementById('qty-input-'+id);
  const reason = document.getElementById('qty-reason-'+id);
  if (badge) { badge.textContent=`현재수량 : ${item.qty.toLocaleString()}`; badge.className='badge-qty'; }
  if (input) input.value = '';
  if (reason) { reason.value = ''; reason.classList.remove('required-empty'); reason.style.display = 'none'; }
  document.getElementById('qty-confirm-'+id).style.display = 'none';
  document.getElementById('qty-cancel-'+id).style.display  = 'none';
  // 방향 초기화
  toggleSign(id, 'minus');
}

function renderLog() {
  const tbody = document.getElementById('log-body');
  if (!logs.length) { tbody.innerHTML='<tr><td colspan="10" class="empty">이력이 없습니다.</td></tr>'; return; }
  tbody.innerHTML = logs.map(l => `
    <tr>
      <td>${l.time}</td>
      <td><span class="badge badge-cat" style="font-size:11px">${l.category||'-'}</span></td>
      <td>${l.name}</td>
      <td>${l.spec||'-'}</td>
      <td>${l.size||'-'}</td>
      <td>${l.material||'-'}</td>
      <td>${l.thickness||'-'}</td>
      <td class="${l.delta>0?'chg-in':'chg-out'}">${l.delta>0?'+':''}${l.delta}</td>
      <td>${l.qty}개</td>
      <td>${l.reason||'-'}</td>
    </tr>`).join('');
}

async function saveItem() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('품목명을 입력해 주세요.'); return; }
  const item = {
    name,
    is_bad:    document.getElementById('f-bad').checked,
    category:  document.getElementById('f-cat').value,
    material:  document.getElementById('f-material').value,
    size:      document.getElementById('f-size').value.trim(),
    spec:      document.getElementById('f-spec').value,
    thickness: document.getElementById('f-thickness').value,
    qty:       parseInt(document.getElementById('f-qty').value)||0,
    min_qty:   parseInt(document.getElementById('f-min').value)||5,
  };
  if (!editId) {
    const dup = items.find(i => i.name===item.name && (i.category||'')===(item.category||'') && (i.spec||'')===(item.spec||'') && (i.thickness||'')===(item.thickness||''));
    if (dup) { toast('이미 등록된 품목이에요!'); return; }
    const id = 'ITEM_' + Date.now();
    await sb('품목', 'POST', {...item, id});
    items.push({id, isBad:item.is_bad, category:item.category, name:item.name,
      material:item.material, size:item.size, spec:item.spec,
      thickness:item.thickness, qty:item.qty, min:item.min_qty});
    toast('품목이 추가되었습니다.');
  } else {
    await sb(`품목?id=eq.${editId}`, 'PATCH', item);
    const idx = items.findIndex(i => i.id===editId);
    items[idx] = {...items[idx], isBad:item.is_bad, category:item.category,
      name:item.name, material:item.material, size:item.size,
      spec:item.spec, thickness:item.thickness, qty:item.qty, min:item.min_qty};
    toast('품목이 수정되었습니다.');
  }
  saveCache({items, logs});
  closeModal(); renderCatChips(); renderItems();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

loadAll();
</script>
</body>
