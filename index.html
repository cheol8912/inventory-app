<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>재고관리 시스템</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #4285F4; --primary-light: #E8F0FE;
    --danger: #EA4335; --danger-light: #FDE8E8;
    --success: #34A853; --success-light: #E6F4EA;
    --warning: #FBBC04; --warning-light: #FEF7E0;
    --gray-50: #F8F9FA; --gray-100: #F1F3F4; --gray-200: #E8EAED;
    --gray-400: #BDC1C6; --gray-600: #80868B; --gray-900: #202124;
    --radius: 8px; --shadow: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08);
  }
  body { font-family: 'Google Sans', Roboto, Arial, sans-serif; background: var(--gray-50); color: var(--gray-900); min-height: 100vh; }
  .header { background: #fff; border-bottom: 1px solid var(--gray-200); padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 10; box-shadow: var(--shadow); }
  .header h1 { font-size: 18px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .header h1 span { color: var(--primary); }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .sync-status { font-size: 12px; color: var(--gray-600); display: flex; align-items: center; gap: 5px; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); }
  .sync-dot.loading { background: var(--warning); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .tab-bar { background: #fff; border-bottom: 1px solid var(--gray-200); padding: 0 1.5rem; display: flex; }
  .tab { padding: 14px 20px; font-size: 14px; font-weight: 500; color: var(--gray-600); border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.15s; }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
  .main { max-width: 960px; margin: 0 auto; padding: 1.5rem; }

  /* 툴바 */
  .toolbar { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  .search-input { flex: 1; min-width: 180px; padding: 9px 14px; border: 1px solid var(--gray-200); border-radius: var(--radius); font-size: 14px; background: #fff; color: var(--gray-900); outline: none; transition: border-color 0.15s; }
  .search-input:focus { border-color: var(--primary); }
  .filter-select { padding: 9px 12px; border: 1px solid var(--gray-200); border-radius: var(--radius); font-size: 14px; background: #fff; color: var(--gray-900); outline: none; cursor: pointer; }
  .filter-select:focus { border-color: var(--primary); }
  .btn { padding: 9px 18px; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: #3367D6; }
  .btn-outline { background: #fff; color: var(--primary); border: 1px solid var(--primary); }
  .btn-outline:hover { background: var(--primary-light); }

  /* 카테고리 필터 버튼 */
  .cat-filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
  .cat-chip { padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; border: 1px solid var(--gray-200); background: #fff; color: var(--gray-600); cursor: pointer; transition: all 0.15s; }
  .cat-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  /* 카테고리별 그룹 */
  .cat-group { margin-bottom: 1.5rem; }
  .cat-group-title { font-size: 13px; font-weight: 600; color: var(--gray-600); padding: 6px 12px; background: var(--gray-100); border-radius: var(--radius); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .cat-count { font-size: 11px; background: var(--gray-200); color: var(--gray-600); padding: 1px 7px; border-radius: 10px; }

  /* 품목 카드 */
  .item-card { background: #fff; border: 1px solid var(--gray-200); border-radius: 14px; padding: 14px 20px; margin-bottom: 8px; box-shadow: var(--shadow); }
  .item-card.low { border-color: var(--warning); background: var(--warning-light); }
  .item-body { display: flex; align-items: flex-start; gap: 6px; flex-direction: column; }
  .badges { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; width: 100%; }
  /* 배지 - 회색 기본 */
  .badge { font-size: clamp(10px, 2.5vw, 13px); font-weight: 500; padding: clamp(3px,1vw,5px) clamp(7px,2vw,12px); border-radius: 50px; background: var(--gray-100); color: var(--gray-900); display: inline-flex; align-items: center; justify-content: center; white-space: nowrap; }
  .badge-cat { background: #E8F0FE; color: #1a56c4; }
  .badge-qty { background: var(--gray-100); color: #e03131; font-weight: 700; font-size: clamp(11px, 2.8vw, 14px); padding: clamp(3px,1vw,5px) clamp(8px,2.5vw,14px); border-radius: 50px; white-space: nowrap; border: 1.5px solid #e03131; }
  .badge-warn { background: var(--warning-light); color: #B06000; font-size: clamp(10px, 2.2vw, 12px); padding: 3px 8px; border-radius: 50px; }
  .item-right { display: flex; align-items: center; gap: 8px; justify-content: flex-end; width: 100%; }
  /* 수량 직접 입력 */
  .qty-input { font-size: 16px; font-weight: 700; color: var(--gray-900); width: 52px; text-align: center; border: 1.5px solid var(--gray-200); border-radius: var(--radius); padding: 4px 0; background: #fff; outline: none; }
  .qty-input:focus { border-color: var(--primary); }
  .qty-input.low { color: var(--danger); border-color: var(--danger); }
  .qty-view { font-size: 16px; font-weight: 700; color: var(--gray-900); min-width: 32px; text-align: center; }
  .qty-view.low { color: var(--danger); }
  .qty-btn { width: 36px; height: 36px; border-radius: 50%; background: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; flex-shrink: 0; border: 1.5px solid; }
  .qty-btn-minus { color: var(--danger); border-color: var(--danger); }
  .qty-btn-minus:hover { background: var(--danger-light); }
  .qty-btn-plus { color: var(--success); border-color: var(--success); }
  .qty-btn-plus:hover { background: var(--success-light); }
  .qty-btn-plus5 { width: auto; padding: 0 12px; height: 36px; border-radius: 50px; background: #fff; color: var(--success); border: 1.5px solid var(--success); font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .qty-btn-plus5:hover { background: var(--success-light); }
  .mini-log { margin-top: 10px; border-top: 1px solid var(--gray-200); padding-top: 8px; }
  .mini-log-title { font-size: 11px; color: var(--gray-600); margin-bottom: 4px; font-weight: 500; }
  .mini-log-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--gray-600); padding: 2px 0; }
  .log-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .log-dot.in { background: var(--success); }
  .log-dot.out { background: var(--danger); }

  /* 이력 탭 */
  .log-table-wrap { background: #fff; border: 1px solid var(--gray-200); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); }
  .log-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .log-table th { background: var(--gray-50); color: var(--gray-600); font-weight: 600; font-size: 12px; padding: 10px 16px; text-align: left; border-bottom: 1px solid var(--gray-200); }
  .log-table td { padding: 10px 16px; border-bottom: 1px solid var(--gray-100); }
  .log-table tr:last-child td { border-bottom: none; }
  .log-table tr:hover td { background: var(--gray-50); }
  .chg-in { color: var(--success); font-weight: 600; }
  .chg-out { color: var(--danger); font-weight: 600; }

  /* 모달 */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
  .modal { background: #fff; border-radius: 16px; padding: 1.75rem; width: 400px; max-width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.18); max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 18px; font-weight: 600; margin-bottom: 1.25rem; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 13px; color: var(--gray-600); font-weight: 500; margin-bottom: 4px; }
  .form-group input, .form-group select { width: 100%; padding: 9px 12px; border: 1px solid var(--gray-200); border-radius: var(--radius); font-size: 14px; color: var(--gray-900); outline: none; transition: border-color 0.15s; background: #fff; }
  .form-group input:focus, .form-group select:focus { border-color: var(--primary); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.25rem; }

  /* 카테고리 관리 */
  .cat-manage { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .cat-tag { font-size: 12px; padding: 3px 10px; border-radius: 20px; background: var(--primary-light); color: var(--primary); display: flex; align-items: center; gap: 4px; }
  .cat-tag-del { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 14px; line-height: 1; padding: 0; }
  .cat-add-row { display: flex; gap: 6px; margin-top: 8px; }
  .cat-add-row input { flex: 1; padding: 6px 10px; border: 1px solid var(--gray-200); border-radius: var(--radius); font-size: 13px; outline: none; }
  .cat-add-row input:focus { border-color: var(--primary); }
  .cat-add-row button { padding: 6px 12px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius); font-size: 13px; cursor: pointer; }

  .section-label { font-size: 12px; font-weight: 600; color: var(--gray-600); text-transform: uppercase; letter-spacing: 0.05em; margin: 1.25rem 0 0.6rem; }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--gray-600); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .loading { text-align: center; padding: 3rem; color: var(--gray-600); font-size: 14px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--gray-900); color: #fff; padding: 10px 22px; border-radius: 24px; font-size: 14px; opacity: 0; transition: opacity 0.2s; z-index: 200; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  @media (max-width: 500px) {
    .main { padding: 1rem; }
    .qty-btn-plus5 { display: none; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📦 <span>재고</span>관리</h1>
  <div class="header-right">
    <div class="sync-status" id="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-text">연결됨</span>
    </div>
    <span id="admin-badge" style="display:none;font-size:12px;background:#E6F4EA;color:#1e7e34;padding:5px 12px;border-radius:20px;font-weight:600;">관리자 모드</span>
    <button id="admin-login-btn" class="btn btn-outline" style="font-size:13px;padding:7px 14px;" onclick="openAdminModal()">🔒 관리자 로그인</button>
    <button id="admin-logout-btn" class="btn btn-outline" style="display:none;font-size:13px;padding:7px 14px;color:var(--danger);border-color:var(--danger);" onclick="adminLogout()">로그아웃</button>
    <button id="cat-btn" class="btn btn-outline" style="display:none;font-size:13px;padding:7px 12px;" onclick="openCatModal()">카테고리 관리</button>
    <button id="add-btn" class="btn btn-primary" style="display:none;" onclick="openAddModal()">+ 품목 추가</button>
  </div>
</div>

<div class="tab-bar">
  <button class="tab active" onclick="switchTab('stock')">재고 현황</button>
  <button class="tab" onclick="switchTab('log')">입출고 이력</button>
</div>

<div class="main">

  <!-- 재고 현황 탭 -->
  <div id="tab-stock">
    <div class="toolbar">
      <input class="search-input" id="search" type="text" placeholder="🔍 품목명, 재질, 규격 검색..." oninput="renderItems()">
      <select class="filter-select" id="sort-select" onchange="renderItems()">
        <option value="name">이름순</option>
        <option value="cat">카테고리순</option>
        <option value="spec">규격순</option>
        <option value="qty-asc">수량 적은순</option>
        <option value="qty-desc">수량 많은순</option>
      </select>
      <button class="btn btn-outline" onclick="loadAll()">↻ 새로고침</button>
    </div>

    <!-- 카테고리 필터 칩 -->
    <div class="cat-filter-row" id="cat-filter-row"></div>

    <div id="low-section" style="display:none">
      <div class="section-label">⚠ 재고 부족</div>
      <div id="low-list"></div>
    </div>

    <div id="item-list"><div class="loading">데이터를 불러오는 중...</div></div>
  </div>

  <!-- 이력 탭 -->
  <div id="tab-log" style="display:none">
    <div class="section-label">입출고 이력 (최근 100건)</div>
    <div class="log-table-wrap">
      <table class="log-table">
        <thead><tr><th>시간</th><th>카테고리</th><th>품목명</th><th>변경</th><th>잔여</th></tr></thead>
        <tbody id="log-body"><tr><td colspan="5" class="loading">불러오는 중...</td></tr></tbody>
      </table>
    </div>
  </div>

</div>

<!-- 관리자 로그인 모달 -->
<div class="modal-overlay" id="admin-modal" style="display:none" onclick="if(event.target===this)closeAdminModal()">
  <div class="modal" style="width:320px;">
    <h3>🔒 관리자 로그인</h3>
    <p style="font-size:13px;color:var(--gray-600);margin-bottom:1rem;">관리자 비밀번호를 입력하세요.</p>
    <div class="form-group">
      <label>비밀번호</label>
      <input id="admin-pw" type="password" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')submitAdminLogin()">
    </div>
    <div id="admin-error" style="display:none;font-size:13px;color:var(--danger);margin-top:6px;">비밀번호가 틀렸습니다.</div>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeAdminModal()">취소</button>
      <button class="btn btn-primary" onclick="submitAdminLogin()">로그인</button>
    </div>
  </div>
</div>

<!-- 품목 추가/수정 모달 -->
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="modal-title">품목 추가</h3>
    <div class="form-group">
      <label>카테고리 *</label>
      <select id="f-cat">
        <option value="">카테고리 선택</option>
      </select>
    </div>
    <div class="form-group">
      <label>품목명 *</label>
      <input id="f-name" type="text" placeholder="예: 강관 파이프">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>재질</label>
        <input id="f-material" type="text" placeholder="예: SS400">
      </div>
      <div class="form-group">
        <label>사이즈</label>
        <input id="f-size" type="text" placeholder="예: 6M">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>규격</label>
        <input id="f-spec" type="text" placeholder="예: 100A">
      </div>
      <div class="form-group">
        <label>수량</label>
        <input id="f-qty" type="number" min="0" value="0">
      </div>
    </div>
    <div class="form-group">
      <label>최소 재고 (경고 기준)</label>
      <input id="f-min" type="number" min="0" value="5">
    </div>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveItem()">저장</button>
    </div>
  </div>
</div>

<!-- 카테고리 관리 모달 -->
<div class="modal-overlay" id="cat-modal" style="display:none" onclick="if(event.target===this)closeCatModal()">
  <div class="modal">
    <h3>카테고리 관리</h3>
    <p style="font-size:13px;color:var(--gray-600);margin-bottom:1rem;">품목 추가 시 선택할 카테고리를 관리해요.</p>
    <div class="cat-manage" id="cat-manage-list"></div>
    <div class="cat-add-row">
      <input id="cat-new-input" type="text" placeholder="새 카테고리 입력 (예: 강관)">
      <button onclick="addCategory()">추가</button>
    </div>
    <div class="modal-btns" style="margin-top:1.5rem;">
      <button class="btn btn-primary" onclick="closeCatModal()">완료</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// ▼▼▼ 여기에 배포 후 받은 웹앱 URL을 붙여넣으세요 ▼▼▼
const API_URL = 'https://script.google.com/macros/s/AKfycbyI-5ymn7w0nekGNnORWhjWftCHsmxKhDU3b0sfDjpg5azYczvLK5OpLwSVQyPKp8di/exec';
// ============================================================

let items = [], logs = [], editId = null;
let categories = ['강관', '각관', '앵글', '플레이트', '플랜지', '밸브', '볼트/너트'];
let activeCat = '전체';

// --- API ---
async function api(action, extra = {}) {
  setSyncing(true);
  try {
    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, ...extra }) });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return data;
  } finally {
    setSyncing(false);
  }
}

function setSyncing(v) {
  document.getElementById('sync-dot').className = 'sync-dot' + (v ? ' loading' : '');
  document.getElementById('sync-text').textContent = v ? '동기화 중...' : '연결됨';
}

// --- 관리자 권한 ---
let isAdmin = false;

function openAdminModal() {
  document.getElementById('admin-pw').value = '';
  document.getElementById('admin-error').style.display = 'none';
  document.getElementById('admin-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('admin-pw').focus(), 100);
}
function closeAdminModal() {
  document.getElementById('admin-modal').style.display = 'none';
}
async function submitAdminLogin() {
  const pw = document.getElementById('admin-pw').value;
  try {
    const r = await api('checkAdmin', { password: pw });
    if (r.ok) {
      isAdmin = true;
      closeAdminModal();
      applyAdminUI();
      toast('관리자 모드로 전환됐어요.');
    } else {
      document.getElementById('admin-error').style.display = 'block';
    }
  } catch(e) {
    document.getElementById('admin-error').style.display = 'block';
  }
}
function adminLogout() {
  isAdmin = false;
  applyAdminUI();
  toast('로그아웃됐어요.');
}
function applyAdminUI() {
  // 헤더 버튼
  document.getElementById('admin-badge').style.display      = isAdmin ? '' : 'none';
  document.getElementById('admin-login-btn').style.display  = isAdmin ? 'none' : '';
  document.getElementById('admin-logout-btn').style.display = isAdmin ? '' : 'none';
  document.getElementById('cat-btn').style.display          = isAdmin ? '' : 'none';
  document.getElementById('add-btn').style.display          = isAdmin ? '' : 'none';
  // 카드 내 버튼/입력창
  document.querySelectorAll('.admin-only').forEach(el => el.style.display = isAdmin ? '' : 'none');
  document.querySelectorAll('.qty-view').forEach(el => el.style.display   = isAdmin ? 'none' : '');
}

async function loadAll() {
  const [r1, r2] = await Promise.all([api('getItems'), api('getLogs')]);
  items = r1.items || [];
  logs  = r2.logs  || [];
  renderCatChips();
  renderItems();
  renderLog();
  applyAdminUI();
}

// --- 카테고리 칩 ---
function renderCatChips() {
  const usedCats = [...new Set(items.map(i => i.category).filter(Boolean))];
  const allCats = ['전체', ...categories];
  const row = document.getElementById('cat-filter-row');
  row.innerHTML = allCats.map(c =>
    `<button class="cat-chip${activeCat === c ? ' active' : ''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');
}

function setCat(cat) {
  activeCat = cat;
  renderCatChips();
  renderItems();
}

// --- 품목 렌더링 ---
function renderItems() {
  const q    = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort-select').value;

  let filtered = items.filter(i =>
    i.qty > 0 &&
    (activeCat === '전체' || i.category === activeCat) &&
    (i.name.toLowerCase().includes(q) ||
     (i.material||'').toLowerCase().includes(q) ||
     (i.spec||'').toLowerCase().includes(q) ||
     (i.category||'').toLowerCase().includes(q))
  );

  // 정렬
  filtered.sort((a, b) => {
    if (sort === 'cat')      return (a.category||'').localeCompare(b.category||'');
    if (sort === 'spec')     return (a.spec||'').localeCompare(b.spec||'');
    if (sort === 'qty-asc')  return a.qty - b.qty;
    if (sort === 'qty-desc') return b.qty - a.qty;
    return a.name.localeCompare(b.name);
  });

  // 재고 부족
  const low = filtered.filter(i => i.qty < i.min);
  const lowSec = document.getElementById('low-section');
  lowSec.style.display = low.length ? '' : 'none';
  document.getElementById('low-list').innerHTML = low.map(cardHTML).join('');

  // 카테고리별 그룹 (카테고리순 정렬 시)
  const el = document.getElementById('item-list');
  if (!filtered.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>품목이 없습니다.</div>';
    return;
  }

  if (sort === 'cat') {
    const groups = {};
    filtered.forEach(i => {
      const key = i.category || '미분류';
      if (!groups[key]) groups[key] = [];
      groups[key].push(i);
    });
    el.innerHTML = Object.entries(groups).map(([cat, list]) => `
      <div class="cat-group">
        <div class="cat-group-title">
          ${cat} <span class="cat-count">${list.length}개 품목</span>
        </div>
        ${list.map(cardHTML).join('')}
      </div>
    `).join('');
  } else {
    el.innerHTML = filtered.map(cardHTML).join('');
  }
}

function cardHTML(item) {
  const isLow = item.qty < item.min;
  const itemLogs = logs.filter(l => l.id === item.id).slice(0, 3);
  const miniLog = itemLogs.length ? `
    <div class="mini-log">
      <div class="mini-log-title">최근 이력</div>
      ${itemLogs.map(l => `
        <div class="mini-log-item">
          <div class="log-dot ${l.delta > 0 ? 'in' : 'out'}"></div>
          ${l.time} · ${l.delta > 0 ? '+' : ''}${l.delta}개 → 잔여 ${l.qty}개
        </div>`).join('')}
    </div>` : '';

  return `
  <div class="item-card${isLow ? ' low' : ''}">
    <div class="item-body">
      <div class="badges">
        ${item.category ? `<span class="badge badge-cat">${item.category}</span>` : ''}
        ${item.spec     ? `<span class="badge">${item.spec}</span>`               : ''}
        <span class="badge">${item.name}</span>
        ${item.size     ? `<span class="badge">${item.size}</span>`               : ''}
        ${item.material ? `<span class="badge">${item.material}</span>`           : ''}
        ${isLow ? '<span class="badge badge-warn">⚠ 재고 부족</span>' : ''}
      </div>
      <div class="item-right">
        <span class="badge-qty">현재수량 : ${item.qty}</span>
        <button class="qty-btn qty-btn-minus admin-only" style="display:none" onclick="changeQty('${item.id}',-1)">−</button>
        <input
          class="qty-input${isLow ? ' low' : ''} admin-only"
          style="display:none"
          type="number" min="0"
          value="${item.qty}"
          onchange="setQty('${item.id}', this)"
          onclick="this.select()"
        >
        <button class="qty-btn qty-btn-plus admin-only" style="display:none" onclick="changeQty('${item.id}',1)">+</button>
        <button class="qty-btn qty-btn-plus5 admin-only" style="display:none" onclick="changeQty('${item.id}',5)">+5</button>
      </div>
    </div>
    ${miniLog}
  </div>`;
}

// --- 수량 변경 ---
async function changeQty(id, delta) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  if (item.qty + delta < 0) { toast('수량이 0 이하가 될 수 없습니다.'); return; }
  const r = await api('changeQty', { id, delta });
  item.qty = r.qty;
  const time = new Date().toLocaleString('ko-KR', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  logs.unshift({ id, name: item.name, category: item.category, delta, qty: r.qty, time });
  renderItems();
  renderLog();
  toast(`${item.name} ${delta > 0 ? '+' + delta : delta}개 변경 완료`);
}

// 수량 직접 입력
async function setQty(id, input) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  const newVal = parseInt(input.value);
  if (isNaN(newVal) || newVal < 0) { input.value = item.qty; return; }
  const delta = newVal - item.qty;
  if (delta === 0) return;
  const r = await api('changeQty', { id, delta });
  item.qty = r.qty;
  const time = new Date().toLocaleString('ko-KR', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  logs.unshift({ id, name: item.name, category: item.category, delta, qty: r.qty, time });
  renderItems();
  renderLog();
  toast(`${item.name} 수량 → ${r.qty}개`);
}

// --- 이력 ---
function renderLog() {
  const tbody = document.getElementById('log-body');
  if (!logs.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty">이력이 없습니다.</td></tr>'; return; }
  tbody.innerHTML = logs.map(l => `
    <tr>
      <td>${l.time}</td>
      <td><span class="badge badge-cat" style="font-size:11px">${l.category||'-'}</span></td>
      <td>${l.name}</td>
      <td class="${l.delta > 0 ? 'chg-in' : 'chg-out'}">${l.delta > 0 ? '+' : ''}${l.delta}</td>
      <td>${l.qty}개</td>
    </tr>`).join('');
}

// --- 탭 ---
function switchTab(tab) {
  document.getElementById('tab-stock').style.display = tab === 'stock' ? '' : 'none';
  document.getElementById('tab-log').style.display   = tab === 'log'   ? '' : 'none';
  document.querySelectorAll('.tab').forEach((t, i) =>
    t.classList.toggle('active', (i===0&&tab==='stock')||(i===1&&tab==='log'))
  );
}

// --- 카테고리 관리 모달 ---
function openCatModal() {
  renderCatManageList();
  document.getElementById('cat-modal').style.display = 'flex';
}
function closeCatModal() {
  document.getElementById('cat-modal').style.display = 'none';
  renderCatChips();
  updateCatSelect();
}
function renderCatManageList() {
  document.getElementById('cat-manage-list').innerHTML = categories.map((c, i) => `
    <div class="cat-tag">
      ${c}
      <button class="cat-tag-del" onclick="deleteCategory(${i})" title="삭제">×</button>
    </div>`).join('');
}
function addCategory() {
  const input = document.getElementById('cat-new-input');
  const val = input.value.trim();
  if (!val) return;
  if (categories.includes(val)) { toast('이미 있는 카테고리예요.'); return; }
  categories.push(val);
  input.value = '';
  renderCatManageList();
  toast(`"${val}" 카테고리 추가됨`);
}
function deleteCategory(idx) {
  const name = categories[idx];
  if (items.some(i => i.category === name)) {
    toast(`"${name}"을 사용 중인 품목이 있어요.`); return;
  }
  categories.splice(idx, 1);
  renderCatManageList();
}
function updateCatSelect() {
  const sel = document.getElementById('f-cat');
  const cur = sel.value;
  sel.innerHTML = '<option value="">카테고리 선택</option>' +
    categories.map(c => `<option value="${c}"${c===cur?' selected':''}>${c}</option>`).join('');
}

// --- 품목 추가/수정 모달 ---
function openAddModal() {
  editId = null;
  document.getElementById('modal-title').textContent = '품목 추가';
  updateCatSelect();
  document.getElementById('f-cat').value = '';
  ['name','material','size','spec'].forEach(f => document.getElementById('f-' + f).value = '');
  document.getElementById('f-qty').value = 0;
  document.getElementById('f-min').value = 5;
  document.getElementById('modal').style.display = 'flex';
}
function openEditModal(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  editId = id;
  document.getElementById('modal-title').textContent = '품목 수정';
  updateCatSelect();
  document.getElementById('f-cat').value      = item.category || '';
  document.getElementById('f-name').value     = item.name;
  document.getElementById('f-material').value = item.material || '';
  document.getElementById('f-size').value     = item.size || '';
  document.getElementById('f-spec').value     = item.spec || '';
  document.getElementById('f-qty').value      = item.qty;
  document.getElementById('f-min').value      = item.min;
  document.getElementById('modal').style.display = 'flex';
}
function closeModal() {
  document.getElementById('modal').style.display = 'none';
}
async function saveItem() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('품목명을 입력해 주세요.'); return; }
  const item = {
    name,
    category: document.getElementById('f-cat').value,
    material: document.getElementById('f-material').value.trim(),
    size:     document.getElementById('f-size').value.trim(),
    spec:     document.getElementById('f-spec').value.trim(),
    qty:      parseInt(document.getElementById('f-qty').value) || 0,
    min:      parseInt(document.getElementById('f-min').value) || 5,
  };
  // 중복 체크 (추가 시에만, 카테고리+품목명+규격 동일하면 중복)
  if (!editId) {
    const dup = items.find(i =>
      i.name === item.name &&
      (i.category||'') === (item.category||'') &&
      (i.spec||'') === (item.spec||'')
    );
    if (dup) {
      toast(`이미 등록된 품목이에요! (${item.category ? item.category+' · ' : ''}${item.name}${item.spec ? ' · '+item.spec : ''})`);
      return;
    }
  }
  if (editId) {
    await api('updateItem', { item: { ...item, id: editId } });
    const idx = items.findIndex(i => i.id === editId);
    items[idx] = { ...items[idx], ...item };
    toast('품목이 수정되었습니다.');
  } else {
    const r = await api('addItem', { item });
    items.push({ id: r.id, ...item });
    toast('품목이 추가되었습니다.');
  }
  closeModal();
  renderCatChips();
  renderItems();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

loadAll();
</script>
