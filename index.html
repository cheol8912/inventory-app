<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>재고관리 시스템</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #4285F4; --primary-light: #E8F0FE;
    --danger: #EA4335; --danger-light: #FDE8E8;
    --success: #34A853; --success-light: #E6F4EA;
    --warning: #FBBC04; --warning-light: #FEF7E0;
    --gray-50: #F8F9FA; --gray-100: #F1F3F4; --gray-200: #E8EAED;
    --gray-400: #BDC1C6; --gray-600: #80868B; --gray-900: #202124;
    --radius: 8px; --shadow: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08);
  }
  body { font-family: 'Google Sans', Roboto, Arial, sans-serif; background: var(--gray-50); color: var(--gray-900); min-height: 100vh; }
  .header { background: #fff; border-bottom: 1px solid var(--gray-200); padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 10; box-shadow: var(--shadow); }
  .header h1 { font-size: 18px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .header h1 span { color: var(--primary); }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .sync-status { font-size: 12px; color: var(--gray-600); display: flex; align-items: center; gap: 5px; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); }
  .sync-dot.loading { background: var(--warning); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .tab-bar { background: #fff; border-bottom: 1px solid var(--gray-200); padding: 0 1.5rem; display: flex; }
  .tab { padding: 14px 20px; font-size: 14px; font-weight: 500; color: var(--gray-600); border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.15s; }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
  .main { max-width: 960px; margin: 0 auto; padding: 1.5rem; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  .search-input { flex: 1; min-width: 180px; padding: 9px 14px; border: 1px solid var(--gray-200); border-radius: var(--radius); font-size: 14px; background: #fff; color: var(--gray-900); outline: none; }
  .search-input:focus { border-color: var(--primary); }
  .filter-select { padding: 9px 12px; border: 1px solid var(--gray-200); border-radius: var(--radius); font-size: 14px; background: #fff; color: var(--gray-900); outline: none; cursor: pointer; }
  .btn { padding: 9px 18px; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: #3367D6; }
  .btn-outline { background: #fff; color: var(--primary); border: 1px solid var(--primary); }
  .btn-outline:hover { background: var(--primary-light); }
  .cat-filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
  .cat-chip { padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; border: 1px solid var(--gray-200); background: #fff; color: var(--gray-600); cursor: pointer; transition: all 0.15s; }
  .cat-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .cat-group { margin-bottom: 1.5rem; }
  .cat-group-title { font-size: 13px; font-weight: 600; color: var(--gray-600); padding: 6px 12px; background: var(--gray-100); border-radius: var(--radius); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .cat-count { font-size: 11px; background: var(--gray-200); color: var(--gray-600); padding: 1px 7px; border-radius: 10px; }
  /* 카드 */
  .item-card { background: #fff; border: 1px solid var(--gray-200); border-radius: 14px; padding: 10px 12px; margin-bottom: 6px; box-shadow: var(--shadow); }
  .item-card.low { border-color: var(--warning); background: var(--warning-light); }
  .item-body { display: flex; align-items: center; gap: 8px; min-height: 44px; flex-wrap: wrap; }
  /* 좌측: flex로 배지 크기 자연스럽게 */
  .item-left { flex: 1; min-width: 0; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .item-field { white-space: nowrap; }
  /* 악성 배지 */
  .item-field.f-bad { display: inline-flex; align-items: center; justify-content: center; color: #e03131; font-weight: 700; border: 1.5px solid #e03131; border-radius: 50px; padding: 3px 10px; font-size: 13px; background: #fff; white-space: nowrap; }
  /* 일반 배지 (라벨 단추 모양 유지) */
  .item-field.f-badge { display: inline-flex; align-items: center; justify-content: center; background: var(--gray-100); color: var(--gray-900); border-radius: 50px; padding: 3px 8px; font-size: 13px; font-weight: 500; white-space: nowrap; }
  .item-field.f-cat { background: #E8F0FE; color: #1a56c4; border-radius: 50px; padding: 3px 8px; font-size: 13px; font-weight: 500; white-space: nowrap; display: inline-flex; align-items: center; justify-content: center; }
  .item-warn { font-size: 12px; color: #B06000; background: var(--warning-light); border-radius: 50px; padding: 2px 8px; white-space: nowrap; }
  /* 우측: 수량 컨트롤 */
  .item-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; justify-content: flex-end; margin-left: auto; }
  .badge-qty { color: #e03131; font-weight: 700; font-size: 14px; padding: 6px 14px; border-radius: 50px; white-space: nowrap; border: 1.5px solid #e03131; background: #fff; }
  .badge-qty.pending { border-color: var(--warning); color: #7a5c00; }
  /* −/+ 세로 배치 */
  .qty-pm-wrap { display: flex; flex-direction: column; gap: 3px; }
  .qty-btn { width: 28px; height: 28px; border-radius: 50%; background: #fff; font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; flex-shrink: 0; border: 1.5px solid; line-height: 1; padding: 0; }
  .qty-btn-minus { color: var(--danger); border-color: var(--danger); }
  .qty-btn-minus:hover { background: var(--danger-light); }
  .qty-btn-plus { color: var(--success); border-color: var(--success); }
  .qty-btn-plus:hover { background: var(--success-light); }
  .qty-btn-minus.active-minus { background: var(--danger); color: #fff; }
  .qty-btn-plus.active-plus   { background: var(--success); color: #fff; }
  /* 수량 입력창 */
  .qty-direct-input { width: 52px; padding: 4px 6px; border: 1.5px solid var(--gray-200); border-radius: 8px; font-size: 14px; font-weight: 700; text-align: center; outline: none; color: var(--gray-900); }
  .qty-direct-input:focus { border-color: var(--primary); }
  /* 확인/취소 */
  .qty-confirm-btn { height: 36px; padding: 0 16px; background: var(--success); color: #fff; border: none; border-radius: 50px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .qty-confirm-btn:hover { background: #2d9246; }
  .qty-cancel-btn { width: 32px; height: 32px; border-radius: 50%; background: #fff; color: var(--gray-600); border: 1.5px solid var(--gray-200); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .qty-cancel-btn:hover { background: var(--gray-100); }
  .log-table-wrap { background: #fff; border: 1px solid var(--gray-200); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); }
  .log-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .log-table th { background: var(--gray-50); color: var(--gray-600); font-weight: 600; font-size: 12px; padding: 10px 16px; text-align: left; border-bottom: 1px solid var(--gray-200); }
  .log-table td { padding: 10px 16px; border-bottom: 1px solid var(--gray-100); }
  .log-table tr:last-child td { border-bottom: none; }
  .log-table tr:hover td { background: var(--gray-50); }
  .chg-in { color: var(--success); font-weight: 600; }
  .chg-out { color: var(--danger); font-weight: 600; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
  .modal { background: #fff; border-radius: 16px; padding: 1.75rem; width: 420px; max-width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.18); max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 18px; font-weight: 600; margin-bottom: 1.25rem; }
  .form-group { margin-bottom: 14px; }
  .form-group input, .form-group select { width: 100%; padding: 9px 12px; border: 1px solid var(--gray-200); border-radius: var(--radius); font-size: 14px; color: var(--gray-900); outline: none; background: #fff; }
  .form-group input:focus, .form-group select:focus { border-color: var(--primary); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.25rem; }
  .field-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
  .field-label { font-size: 13px; color: var(--gray-600); font-weight: 500; }
  .manage-btn { background: none; border: none; color: var(--primary); font-size: 12px; font-weight: 600; cursor: pointer; padding: 0; }
  .manage-btn:hover { text-decoration: underline; }
  .inline-panel { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 10px; margin-top: 6px; margin-bottom: 6px; }
  .tag-wrap { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; min-height: 26px; }
  .itag { font-size: 12px; padding: 3px 10px; border-radius: 20px; background: #E8F0FE; color: #1a56c4; display: inline-flex; align-items: center; gap: 3px; }
  .itag-del { background: none; border: none; color: #1a56c4; cursor: pointer; font-size: 14px; line-height: 1; padding: 0; }
  .add-row { display: flex; gap: 6px; }
  .add-row input { flex: 1; padding: 6px 10px; border: 1px solid var(--gray-200); border-radius: var(--radius); font-size: 13px; outline: none; background: #fff; }
  .add-row input:focus { border-color: var(--primary); }
  .add-row button { padding: 6px 14px; background: var(--primary); color: #fff; border: none; border-radius: 20px; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .section-label { font-size: 12px; font-weight: 600; color: var(--gray-600); text-transform: uppercase; letter-spacing: 0.05em; margin: 1.25rem 0 0.6rem; }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--gray-600); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .loading { text-align: center; padding: 3rem; color: var(--gray-600); font-size: 14px; }
  /* 캐시 배너 */
  .cache-banner { background: var(--warning-light); border-bottom: 1px solid var(--warning); padding: 6px 1.5rem; font-size: 12px; color: #7a5c00; display: flex; align-items: center; gap: 8px; }
  .cache-banner.hidden { display: none; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--gray-900); color: #fff; padding: 10px 22px; border-radius: 24px; font-size: 14px; opacity: 0; transition: opacity 0.2s; z-index: 200; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
  @media (max-width: 600px) {
    .main { padding: 0.75rem; }
    /* 헤더 모바일 */
    .header { padding: 0 0.75rem; height: auto; min-height: 56px; flex-wrap: wrap; gap: 6px; padding-top: 8px; padding-bottom: 8px; }
    .header h1 { font-size: 16px; }
    .header-right { gap: 6px; flex-wrap: wrap; }
    .header-right .btn { font-size: 11px; padding: 5px 10px; }
    #admin-badge { font-size: 11px; padding: 4px 8px; }
    /* 카드 모바일 */
    .item-card { padding: 10px; }
    .item-body { gap: 6px; }
    .item-left { flex-wrap: wrap; gap: 4px; }
    .item-right { width: 100%; justify-content: flex-end; margin-left: 0; margin-top: 6px; flex-wrap: wrap; gap: 6px; }
    .badge-qty { font-size: 13px; padding: 5px 10px; }
    .qty-confirm-btn { height: 32px; padding: 0 12px; font-size: 12px; }
    .qty-direct-input { width: 60px; }
    /* 툴바 */
    .toolbar { gap: 6px; }
    .search-input { min-width: 0; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📦 <span>재고</span>관리</h1>
  <div class="header-right">
    <div class="sync-status" id="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-text">연결됨</span>
    </div>
    <span id="admin-badge" style="display:none;font-size:12px;background:#E6F4EA;color:#1e7e34;padding:5px 12px;border-radius:20px;font-weight:600;">관리자 모드</span>
    <button id="admin-login-btn" class="btn btn-outline" style="font-size:13px;padding:7px 14px;" onclick="openAdminModal()">🔒 관리자 로그인</button>
    <button id="admin-logout-btn" class="btn btn-outline" style="display:none;font-size:13px;padding:7px 14px;color:var(--danger);border-color:var(--danger);" onclick="adminLogout()">로그아웃</button>
    <button id="add-btn" class="btn btn-primary" style="display:none;" onclick="openAddModal()">+ 품목 추가</button>
  </div>
</div>

<!-- 캐시 사용 중 배너 -->
<div class="cache-banner hidden" id="cache-banner">
  ⚡ 캐시 데이터를 표시 중입니다. 최신 데이터를 불러오는 중...
</div>

<div class="tab-bar">
  <button class="tab active" onclick="switchTab('stock')">재고 현황</button>
  <button class="tab" onclick="switchTab('log')">입출고 이력</button>
</div>

<div class="main">
  <div id="tab-stock">
    <div class="toolbar">
      <input class="search-input" id="search" type="text" placeholder="🔍 품목명, 재질, 규격 검색..." oninput="renderItems()">
      <select class="filter-select" id="sort-select" onchange="renderItems()">
        <option value="name">이름순</option>
        <option value="cat">카테고리순</option>
        <option value="spec">규격순</option>
        <option value="qty-asc">수량 적은순</option>
        <option value="qty-desc">수량 많은순</option>
      </select>
      <button class="btn btn-outline" onclick="loadAll(true)">↻ 새로고침</button>
    </div>
    <div class="cat-filter-row" id="cat-filter-row"></div>
    <div id="low-section" style="display:none">
      <div class="section-label">⚠ 재고 부족</div>
      <div id="low-list"></div>
    </div>
    <div id="item-list"><div class="loading">⚡ 불러오는 중...</div></div>
  </div>
  <div id="tab-log" style="display:none">
    <div class="section-label">입출고 이력 (최근 100건)</div>
    <div class="log-table-wrap">
      <table class="log-table">
        <thead><tr><th>시간</th><th>카테고리</th><th>품목명</th><th>변경</th><th>잔여</th></tr></thead>
        <tbody id="log-body"><tr><td colspan="5" class="loading">불러오는 중...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- 관리자 로그인 모달 -->
<div class="modal-overlay" id="admin-modal" style="display:none">
  <div class="modal" style="width:320px;">
    <h3>🔒 관리자 로그인</h3>
    <p style="font-size:13px;color:var(--gray-600);margin-bottom:1rem;">관리자 비밀번호를 입력하세요.</p>
    <div class="form-group">
      <input id="admin-pw" type="password" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')submitAdminLogin()">
    </div>
    <div id="admin-error" style="display:none;font-size:13px;color:var(--danger);margin-top:6px;">비밀번호가 틀렸습니다.</div>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeAdminModal()">취소</button>
      <button class="btn btn-primary" onclick="submitAdminLogin()">로그인</button>
    </div>
  </div>
</div>

<!-- 품목 추가/수정 모달 -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <h3 id="modal-title">품목 추가</h3>

    <div class="form-group">
      <div class="field-header">
        <span class="field-label">카테고리 *</span>
        <button class="manage-btn" onclick="togglePanel('cat')">+ 관리</button>
      </div>
      <div class="inline-panel" id="panel-cat" style="display:none">
        <div class="tag-wrap" id="tags-cat"></div>
        <div class="add-row">
          <input id="new-cat" type="text" placeholder="새 카테고리 (예: 형강)" onkeydown="if(event.key==='Enter')addTag('cat')">
          <button onclick="addTag('cat')">추가</button>
        </div>
      </div>
      <select id="f-cat" onchange="onCatChange(this.value)">
        <option value="">카테고리 선택</option>
      </select>
    </div>

    <div class="form-group">
      <div class="field-header"><span class="field-label">품목명 *</span></div>
      <input id="f-name" type="text" placeholder="예: 강관 파이프">
    </div>

    <div class="form-row">
      <div class="form-group">
        <div class="field-header">
          <span class="field-label">재질</span>
          <button class="manage-btn" onclick="togglePanel('material')">+ 관리</button>
        </div>
        <div class="inline-panel" id="panel-material" style="display:none">
          <div class="tag-wrap" id="tags-material"></div>
          <div class="add-row">
            <input id="new-material" type="text" placeholder="예: GC250" onkeydown="if(event.key==='Enter')addTag('material')">
            <button onclick="addTag('material')">추가</button>
          </div>
        </div>
        <select id="f-material"><option value="">선택</option></select>
      </div>
      <div class="form-group">
        <div class="field-header"><span class="field-label">사이즈</span></div>
        <input id="f-size" type="text" placeholder="예: 6M">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <div class="field-header">
          <span class="field-label">규격</span>
          <button class="manage-btn" onclick="togglePanel('spec')">+ 관리</button>
        </div>
        <div class="inline-panel" id="panel-spec" style="display:none">
          <div class="tag-wrap" id="tags-spec"></div>
          <div class="add-row">
            <input id="new-spec" type="text" placeholder="카테고리 선택 후 입력" onkeydown="if(event.key==='Enter')addTag('spec')">
            <button onclick="addTag('spec')">추가</button>
          </div>
        </div>
        <select id="f-spec"><option value="">선택</option></select>
      </div>
      <div class="form-group">
        <div class="field-header">
          <span class="field-label">두께</span>
          <button class="manage-btn" onclick="togglePanel('thickness')">+ 관리</button>
        </div>
        <div class="inline-panel" id="panel-thickness" style="display:none">
          <div class="tag-wrap" id="tags-thickness"></div>
          <div class="add-row">
            <input id="new-thickness" type="text" placeholder="예: 8.0t" onkeydown="if(event.key==='Enter')addTag('thickness')">
            <button onclick="addTag('thickness')">추가</button>
          </div>
        </div>
        <select id="f-thickness"><option value="">선택</option></select>
      </div>
    </div>

    <div class="form-group" style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--gray-50);border-radius:var(--radius);border:1px solid var(--gray-200);">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0;font-size:14px;color:var(--gray-900);font-weight:500;">
        <input type="checkbox" id="f-bad" style="width:16px;height:16px;accent-color:#e03131;cursor:pointer;">
        악성재고로 표시
      </label>
      <span style="font-size:12px;color:var(--gray-600);">체크 시 <span style="color:#e03131;font-weight:600;">악성</span> 배지 표시</span>
    </div>

    <div class="form-row">
      <div class="form-group">
        <div class="field-header"><span class="field-label">수량</span></div>
        <input id="f-qty" type="number" min="0" value="0">
      </div>
      <div class="form-group">
        <div class="field-header"><span class="field-label">최소 재고 (경고 기준)</span></div>
        <input id="f-min" type="number" min="0" value="5">
      </div>
    </div>

    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveItem()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL    = 'https://script.google.com/macros/s/AKfycbyUWOuay_oKJkAeU4URWVk-qtTvutqeFTemiWFlqrIjjMv1Soi1DwBJQQF98EqcKXcf/exec';
const CACHE_KEY  = 'inv_cache';
const OPT_KEY    = 'inv_opt';

let items = [], logs = [], editId = null, isAdmin = false, activeCat = '전체';

// 기본 옵션 (Sheets에서 못 불러올 때 fallback)
const DEFAULT_OPT = {
  cat:       ['강관','각관','앵글','플레이트','플랜지','밸브','볼트/너트'],
  material:  ['SS400','STS304','AL','PP','PE'],
  thickness: ['1.0t','1.2t','1.5t','2.0t','2.3t','2.5t','3.0t','3.2t','4.0t','4.5t','5.0t','6.0t'],
  spec: {
    '강관':     ['15A(Ø21.7)','20A(Ø27.2)','25A(Ø34.0)','32A(Ø42.7)','40A(Ø48.6)','50A(Ø60.5)','65A(Ø76.3)','80A(Ø89.1)','100A(Ø114.3)','125A(Ø139.8)','150A(Ø165.2)','200A(Ø216.3)'],
    '각관':     ['20x20','25x25','30x30','40x40','50x50','60x60','75x75','100x100','20x40','25x50','30x60','40x80','50x100'],
    '앵글':     ['25x25','30x30','40x40','50x50','60x60','75x75','100x100'],
    '플레이트':  ['100x100','150x150','200x200','250x250','300x300'],
    '플랜지':   ['15A','20A','25A','32A','40A','50A','65A','80A','100A','125A','150A','200A'],
    '밸브':     ['15A','20A','25A','32A','40A','50A','65A','80A','100A'],
    '볼트/너트': ['M6','M8','M10','M12','M16','M20','M24'],
  }
};

let optData = JSON.parse(JSON.stringify(DEFAULT_OPT));

// ============================================================
// API
// ============================================================
async function api(action, extra={}) {
  setSyncing(true);
  try {
    const res  = await fetch(API_URL, {method:'POST', body:JSON.stringify({action,...extra})});
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return data;
  } finally {
    setSyncing(false);
  }
}

function setSyncing(v) {
  document.getElementById('sync-dot').className = 'sync-dot'+(v?' loading':'');
  document.getElementById('sync-text').textContent = v ? '동기화 중...' : '연결됨';
}

// ============================================================
// 캐시
// ============================================================
function saveCache(data) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ts: Date.now(), ...data})); } catch(e) {}
}
function loadCache() {
  try { return JSON.parse(localStorage.getItem(CACHE_KEY)); } catch(e) { return null; }
}
function saveOptCache(opt) {
  try { localStorage.setItem(OPT_KEY, JSON.stringify(opt)); } catch(e) {}
}
function loadOptCache() {
  try { return JSON.parse(localStorage.getItem(OPT_KEY)); } catch(e) { return null; }
}

// ============================================================
// 초기 로드 (캐시 우선 → 백그라운드 최신화)
// ============================================================
async function loadAll(forceRefresh=false) {
  const cache    = loadCache();
  const optCache = loadOptCache();

  // 캐시 있으면 즉시 화면에 표시
  if (!forceRefresh && cache && cache.items) {
    items = cache.items;
    logs  = cache.logs || [];
    if (optCache) {
      optData = optCache;
    }
    renderCatChips();
    renderItems();
    renderLog();
    applyAdminUI();
    document.getElementById('cache-banner').classList.remove('hidden');

    // 백그라운드에서 최신 데이터 가져오기
    fetchFresh().then(() => {
      document.getElementById('cache-banner').classList.add('hidden');
    });
    return;
  }

  // 캐시 없거나 강제 새로고침
  document.getElementById('item-list').innerHTML = '<div class="loading">⚡ 불러오는 중...</div>';
  await fetchFresh();
  document.getElementById('cache-banner').classList.add('hidden');
}

async function fetchFresh() {
  try {
    // 3번 호출 → 1번으로 통합
    const r = await api('getAll');
    items = r.items || [];
    logs  = r.logs  || [];

    if (r.optData) {
      optData = r.optData;
      saveOptCache(optData);
    } else {
      const oc = loadOptCache();
      if (oc) optData = oc;
    }

    saveCache({items, logs});
    renderCatChips();
    renderItems();
    renderLog();
    applyAdminUI();
  } catch(e) {
    const cache = loadCache();
    if (cache && cache.items) {
      items = cache.items;
      logs  = cache.logs || [];
      renderCatChips();
      renderItems();
      renderLog();
      toast('⚠ 서버 연결 실패. 캐시 데이터를 표시합니다.');
    }
  }
}

function openAdminModal() {

  document.getElementById('admin-error').style.display = 'none';
  document.getElementById('admin-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('admin-pw').focus(), 100);
}
function closeAdminModal() { document.getElementById('admin-modal').style.display = 'none'; }
async function submitAdminLogin() {
  const pw = document.getElementById('admin-pw').value;
  try {
    const r = await api('checkAdmin', {password: pw});
    if (r.ok) { isAdmin=true; closeAdminModal(); applyAdminUI(); toast('관리자 모드로 전환됐어요.'); }

  } catch(e) { document.getElementById('admin-error').style.display = 'block'; }
}
function adminLogout() { isAdmin=false; applyAdminUI(); toast('로그아웃됐어요.'); }
function applyAdminUI() {
  document.getElementById('admin-badge').style.display      = isAdmin ? '' : 'none';
  document.getElementById('admin-login-btn').style.display  = isAdmin ? 'none' : '';
  document.getElementById('admin-logout-btn').style.display = isAdmin ? '' : 'none';

// ============================================================
// 패널 토글
// ============================================================
function togglePanel(field) {
  const panel  = document.getElementById('panel-'+field);
  const isOpen = panel.style.display !== 'none';
  ['cat','material','spec','thickness'].forEach(f => {
    const p = document.getElementById('panel-'+f);
    if (p) p.style.display = 'none';
  });
  if (!isOpen) { panel.style.display = ''; renderTags(field); }
}

// ============================================================
// 태그 렌더링
// ============================================================
function renderTags(field) {
  const el = document.getElementById('tags-'+field);
  if (field === 'spec') {
    const cat  = document.getElementById('f-cat').value;
    const list = cat ? (optData.spec[cat]||[]) : [];
    if (!cat) { el.innerHTML='<span style="font-size:12px;color:var(--gray-600)">카테고리를 먼저 선택해주세요</span>'; return; }
    el.innerHTML = list.map((v,i) => `<span class="itag">${v}<button class="itag-del" onclick="delTag('spec',${i})">×</button></span>`).join('');
  } else {
    const list = field==='cat' ? optData.cat : (field==='material' ? optData.material : optData.thickness);
    el.innerHTML = list.map((v,i) => `<span class="itag">${v}<button class="itag-del" onclick="delTag('${field}',${i})">×</button></span>`).join('');
  }
}

// ============================================================
// 태그 추가/삭제 → 자동으로 Sheets에 저장
// ============================================================
function addTag(field) {
  const inp = document.getElementById('new-'+field);
  const val = inp.value.trim();
  if (!val) return;
  if (field === 'spec') {
    const cat = document.getElementById('f-cat').value;
    if (!cat) { toast('카테고리를 먼저 선택해주세요.'); return; }
    if (!optData.spec[cat]) optData.spec[cat] = [];
    if (optData.spec[cat].includes(val)) { toast('이미 있어요.'); return; }
    optData.spec[cat].push(val);
    refreshSelect('spec');
  } else if (field === 'cat') {
    if (optData.cat.includes(val)) { toast('이미 있어요.'); return; }
    optData.cat.push(val);
    refreshSelect('cat');
  } else if (field === 'material') {
    if (optData.material.includes(val)) { toast('이미 있어요.'); return; }
    optData.material.push(val);
    refreshSelect('material');
  } else {
    if (optData.thickness.includes(val)) { toast('이미 있어요.'); return; }
    optData.thickness.push(val);
    refreshSelect('thickness');
  }
  inp.value = '';
  renderTags(field);
  toast(`"${val}" 추가됐어요!`);
  persistOptions();
}

function delTag(field, idx) {
  if (field === 'spec') {
    const cat = document.getElementById('f-cat').value;
    if (cat && optData.spec[cat]) { optData.spec[cat].splice(idx,1); refreshSelect('spec'); }
  } else if (field === 'cat') {
    const name = optData.cat[idx];
    if (items.some(i => i.category === name)) { toast(`"${name}"을 사용 중인 품목이 있어요.`); return; }
    optData.cat.splice(idx,1); refreshSelect('cat');
  } else if (field === 'material') {
    optData.material.splice(idx,1); refreshSelect('material');
  } else {
    optData.thickness.splice(idx,1); refreshSelect('thickness');
  }
  renderTags(field);
  persistOptions();
}

// Sheets + 로컬캐시에 옵션 저장
async function persistOptions() {
  saveOptCache(optData);
  try { await api('saveOptions', {optData}); } catch(e) { /* 실패해도 로컬캐시는 남음 */ }
}

// ============================================================
// 셀렉트 갱신
// ============================================================
function refreshSelect(field) {
  if (field === 'cat') {
    const sel = document.getElementById('f-cat');
    const cur = sel.value;
    sel.innerHTML = '<option value="">카테고리 선택</option>' +
      optData.cat.map(c => `<option value="${c}"${c===cur?' selected':''}>${c}</option>`).join('');
    renderCatChips();
  } else if (field === 'material') {
    const sel = document.getElementById('f-material');
    const cur = sel.value;
    sel.innerHTML = '<option value="">선택</option>' +
      optData.material.map(m => `<option${m===cur?' selected':''}>${m}</option>`).join('');
  } else if (field === 'thickness') {
    const sel = document.getElementById('f-thickness');
    const cur = sel.value;
    sel.innerHTML = '<option value="">선택</option>' +
      optData.thickness.map(t => `<option${t===cur?' selected':''}>${t}</option>`).join('');
  } else if (field === 'spec') {
    const cat  = document.getElementById('f-cat').value;
    const sel  = document.getElementById('f-spec');
    const cur  = sel.value;
    const list = cat ? (optData.spec[cat]||[]) : [];
    sel.innerHTML = '<option value="">선택</option>' +
      list.map(s => `<option${s===cur?' selected':''}>${s}</option>`).join('');
  }
}

function onCatChange(cat) {
  refreshSelect('spec');
  const p = document.getElementById('panel-spec');
  if (p && p.style.display !== 'none') renderTags('spec');
}

function initAllSelects() {
  refreshSelect('cat');
  refreshSelect('material');
  refreshSelect('thickness');
  document.getElementById('f-spec').innerHTML = '<option value="">선택</option>';
}

// ============================================================
// 렌더링
// ============================================================
function renderCatChips() {
  const allCats = ['전체','⚠ 악성재고',...optData.cat];
  document.getElementById('cat-filter-row').innerHTML = allCats.map(c =>
    `<button class="cat-chip${activeCat===c?' active':''}" ${c==='⚠ 악성재고'?'style="border-color:#e03131;color:#e03131;"':''} onclick="setCat('${c}')">${c}</button>`
  ).join('');
}
function setCat(cat) { activeCat=cat; renderCatChips(); renderItems(); }

function renderItems() {
  const q    = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort-select').value;
  let filtered = items.filter(i =>
    i.qty > 0 &&
    (activeCat==='전체' || (activeCat==='⚠ 악성재고' && i.isBad) || i.category===activeCat) &&
    (i.name.toLowerCase().includes(q) || (i.material||'').toLowerCase().includes(q) ||
     (i.spec||'').toLowerCase().includes(q) || (i.category||'').toLowerCase().includes(q))
  );
  filtered.sort((a,b) => {
    if (sort==='cat')      return (a.category||'').localeCompare(b.category||'');
    if (sort==='spec')     return (a.spec||'').localeCompare(b.spec||'');
    if (sort==='qty-asc')  return a.qty - b.qty;
    if (sort==='qty-desc') return b.qty - a.qty;
    return a.name.localeCompare(b.name);
  });
  const low = filtered.filter(i => i.qty < i.min);
  document.getElementById('low-section').style.display = low.length ? '' : 'none';
  document.getElementById('low-list').innerHTML = low.map(cardHTML).join('');
  const el = document.getElementById('item-list');
  if (!filtered.length) {
    el.innerHTML='<div class="empty"><div class="empty-icon">📭</div>품목이 없습니다.</div>';
    return;
  }
  if (sort === 'cat') {
    const groups = {};
    filtered.forEach(i => { const k=i.category||'미분류'; if(!groups[k])groups[k]=[]; groups[k].push(i); });
    el.innerHTML = Object.entries(groups).map(([cat,list]) => `
      <div class="cat-group">
        <div class="cat-group-title">${cat}<span class="cat-count">${list.length}개 품목</span></div>
        ${list.map(cardHTML).join('')}
      </div>`).join('');
  } else {
    el.innerHTML = filtered.map(cardHTML).join('');
  }
  applyAdminUI();
}

function cardHTML(item) {
  const isLow = item.qty < item.min;
  const id    = item.id;
  // 좌측 그리드: 특징 | 카테고리 | 규격 | 품목명 | 사이즈 | 재질 | 두께
  const leftHTML = `
    <span class="item-field">${item.isBad ? `<span class="item-field f-bad">악성</span>` : ''}</span>
    <span class="item-field f-cat">${item.category || ''}</span>
    <span class="item-field f-badge">${item.spec || ''}</span>
    <span class="item-field f-badge">${item.name || ''}</span>
    <span class="item-field f-badge">${item.size || ''}</span>
    <span class="item-field f-badge">${item.material || ''}</span>
    <span class="item-field f-badge">${item.thickness || ''}</span>
  `;

  return `
  <div class="item-card${isLow?' low':''}" id="card-${id}">
    <div class="item-body">
      <div class="item-left">${leftHTML}</div>
      <div class="item-right">
        <span class="badge-qty" id="qty-badge-${id}">현재수량 : ${item.qty.toLocaleString()}</span>
        ${isLow ? '<span class="item-warn">⚠ 부족</span>' : ''}
        <div class="qty-pm-wrap admin-only" style="display:none">
          <button class="qty-btn qty-btn-minus active-minus" id="sign-minus-${id}" onclick="toggleSign('${id}','minus')">−</button>
          <button class="qty-btn qty-btn-plus" id="sign-plus-${id}" onclick="toggleSign('${id}','plus')">+</button>
        </div>
        <input class="qty-direct-input admin-only" id="qty-input-${id}" style="display:none" type="number" min="0" placeholder="수량" oninput="onDirectInput('${id}',${item.qty})">
        <button class="qty-confirm-btn admin-only" id="qty-confirm-${id}" style="display:none" onclick="confirmQty('${id}')">✔ 확인</button>
      </div>
    </div>
  </div>`;
}

// 임시 수량 저장소
const pendingQty = {};

// −/+ 버튼: 방향(빼기/더하기) 토글
function toggleSign(id, sign) {
  const minusBtn = document.getElementById('sign-minus-'+id);
  const plusBtn  = document.getElementById('sign-plus-'+id);
  const card     = document.getElementById('card-'+id);
  card.dataset.sign = sign;
  if (sign === 'minus') {
    minusBtn.classList.add('active-minus');
    plusBtn.classList.remove('active-plus');
  } else {
    plusBtn.classList.add('active-plus');
    minusBtn.classList.remove('active-minus');
  }
  // 입력값 있으면 즉시 미리보기 갱신
  const item = items.find(i => i.id===id); if (!item) return;
  onDirectInput(id, item.qty);
}

// 입력창 직접 타이핑
function onDirectInput(id, baseQty) {
  const item  = items.find(i => i.id===id); if (!item) return;
  const card  = document.getElementById('card-'+id);
  const sign  = card.dataset.sign || 'minus';
  const val   = parseInt(document.getElementById('qty-input-'+id).value);
  if (isNaN(val) || val < 0) return;
  const delta = sign === 'minus' ? -val : val;
  const next  = item.qty + delta;
  if (next < 0) {
    document.getElementById('qty-badge-'+id).textContent = `⚠ 수량 부족!`;
    document.getElementById('qty-badge-'+id).className = 'badge-qty pending';
    pendingQty[id] = null;
    document.getElementById('qty-confirm-'+id).style.display = 'none';
    document.getElementById('qty-cancel-'+id).style.display  = val > 0 ? '' : 'none';
    return;
  }
  pendingQty[id] = { delta, localQty: next };
  const badge = document.getElementById('qty-badge-'+id);
  if (val === 0) {
    badge.textContent = `현재수량 : ${item.qty.toLocaleString()}`;
    badge.className   = 'badge-qty';
    document.getElementById('qty-confirm-'+id).style.display = 'none';
    document.getElementById('qty-cancel-'+id).style.display  = 'none';
  } else {
    badge.textContent = `${item.qty.toLocaleString()} → ${next.toLocaleString()}`;
    badge.className   = 'badge-qty pending';
    document.getElementById('qty-confirm-'+id).style.display = '';
    document.getElementById('qty-cancel-'+id).style.display  = '';
  }
}

// 확인 → 서버 저장
async function confirmQty(id) {
  const item = items.find(i => i.id===id); if (!item) return;
  const p    = pendingQty[id];
  if (!p || p.delta === 0) return;
  const r = await api('changeQty', {id, delta: p.delta});
  item.qty = r.qty;
  const time = new Date().toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  logs.unshift({id, name:item.name, category:item.category, delta:p.delta, qty:r.qty, time});
  delete pendingQty[id];
  saveCache({items, logs});
  renderItems();
  applyAdminUI();
  renderLog();
  toast(`${item.name} ${p.delta>0?'+'+p.delta:p.delta}개 저장 완료`);
}

// 취소 → 원복
function cancelQty(id) {
  const item = items.find(i => i.id===id); if (!item) return;
  delete pendingQty[id];
  const badge = document.getElementById('qty-badge-'+id);
  const input = document.getElementById('qty-input-'+id);
  if (badge) { badge.textContent=`현재수량 : ${item.qty.toLocaleString()}`; badge.className='badge-qty'; }
  if (input) input.value = '';
  document.getElementById('qty-confirm-'+id).style.display = 'none';
  document.getElementById('qty-cancel-'+id).style.display  = 'none';
  // 방향 초기화
  toggleSign(id, 'minus');
}

async function changeQty(id, delta) {
  const item = items.find(i => i.id===id); if (!item) return;
  const r = await api('changeQty', {id, delta});
  item.qty = r.qty;
  const time = new Date().toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  logs.unshift({id, name:item.name, category:item.category, delta, qty:r.qty, time});
  saveCache({items, logs});
  renderItems();
  applyAdminUI();
  renderLog();
}

function renderLog() {
  const tbody = document.getElementById('log-body');
  if (!logs.length) { tbody.innerHTML='<tr><td colspan="5" class="empty">이력이 없습니다.</td></tr>'; return; }
  tbody.innerHTML = logs.map(l => `
    <tr>
      <td>${l.time}</td>
      <td><span class="badge badge-cat" style="font-size:11px">${l.category||'-'}</span></td>
      <td>${l.name}</td>
      <td class="${l.delta>0?'chg-in':'chg-out'}">${l.delta>0?'+':''}${l.delta}</td>
      <td>${l.qty}개</td>
    </tr>`).join('');
}

    t.classList.toggle('active', (i===0&&tab==='stock') || (i===1&&tab==='log')));

    const p = document.getElementById('panel-'+f); if (p) p.style.display='none';
  });
  document.getElementById('modal').style.display = 'flex';
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }

async function saveItem() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('품목명을 입력해 주세요.'); return; }
  const item = {
    name,
    isBad:     document.getElementById('f-bad').checked,
    category:  document.getElementById('f-cat').value,
    material:  document.getElementById('f-material').value,
    size:      document.getElementById('f-size').value.trim(),
    spec:      document.getElementById('f-spec').value,
    thickness: document.getElementById('f-thickness').value,
    qty:       parseInt(document.getElementById('f-qty').value)||0,
    min:       parseInt(document.getElementById('f-min').value)||5,
  };
  if (!editId) {
    const dup = items.find(i => i.name===item.name && (i.category||'')===(item.category||'') && (i.spec||'')===(item.spec||'') && (i.thickness||'')===(item.thickness||''));
    if (dup) { toast('이미 등록된 품목이에요!'); return; }
  }
  if (editId) {
    await api('updateItem', {item:{...item, id:editId}});
    const idx = items.findIndex(i => i.id===editId);
    items[idx] = {...items[idx], ...item};
    toast('품목이 수정되었습니다.');
  } else {
    const r = await api('addItem', {item});
    items.push({id:r.id, ...item});
    toast('품목이 추가되었습니다.');
  }
  saveCache({items, logs});
  closeModal(); renderCatChips(); renderItems();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

loadAll();
</script>
